{{- if and (or .Values.backups.full.enabled .Values.backups.incremental.enabled) .Values.backups.nfs.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ template "istari-dgraph-sec.backups.fullname" . }}-claim
  namespace: {{ include "istari-dgraph-sec.namespace" . }}
  labels:
    {{- include "istari-dgraph-sec.labels" (dict "ctx" . "component" .Values.backups.name) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: {{ template "istari-dgraph-sec.backups.fullname" . }}-fileserver
  resources:
    requests:
      storage: {{ .Values.backups.nfs.storage }}
{{- end }}
