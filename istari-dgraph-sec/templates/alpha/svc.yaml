apiVersion: v1
kind: Service
metadata:
  name: {{ template "istari-dgraph-sec.alpha.fullname" . }}
  namespace: {{ include "istari-dgraph-sec.namespace" . }}
  labels:
    {{- $extra := dict "monitor" .Values.alpha.monitorLabel }}
    {{- with .Values.alpha.service.labels }}{{ $extra = merge $extra . }}{{ end }}
    {{- include "istari-dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name "extra" $extra) | nindent 4 }}
  {{- with .Values.alpha.service.annotations }}
  annotations:
    {{- toYaml . | trimSuffix "\n" | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.alpha.service.type }}
  {{- if .Values.alpha.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.alpha.service.loadBalancerIP }}
  {{- end }}
  {{- if .Values.alpha.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.alpha.service.externalTrafficPolicy }}
  {{- end }}
  ports:
    - port: 8080
      targetPort: 8080
      name: http-alpha
    - port: 9080
      name: grpc-alpha
  {{- with .Values.alpha.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    app: {{ template "istari-dgraph-sec.name" . }}
    component: {{ .Values.alpha.name }}
    release: {{ .Release.Name }}
