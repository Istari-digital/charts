apiVersion: v1
kind: Service
metadata:
  name: {{ template "istari-dgraph-sec.alpha.fullname" . }}-headless
  namespace: {{ include "istari-dgraph-sec.namespace" . }}
  labels:
    {{- include "istari-dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name "extra" .Values.alpha.serviceHeadless.labels) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: grpc-alpha-int
      port: 7080
      targetPort: 7080
  selector:
    app: {{ template "istari-dgraph-sec.name" . }}
    component: {{ .Values.alpha.name }}
    release: {{ .Release.Name }}
  publishNotReadyAddresses: {{ .Values.alpha.service.publishNotReadyAddresses }}
