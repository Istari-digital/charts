{{ if and .Values.alpha.acl.enabled .Values.alpha.acl.file }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "istari-dgraph-sec.alpha.fullname" . }}-acl-secret
  namespace: {{ include "istari-dgraph-sec.namespace" . }}
  labels:
    {{- include "istari-dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name) | nindent 4 }}
type: Opaque
data:
  {{- with .Values.alpha.acl.file }}
    {{- toYaml . | trimSuffix "\n" | nindent 2 }}
  {{- end }}
{{ end }}
