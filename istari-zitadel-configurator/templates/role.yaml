apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "istari-zitadel-configurator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "istari-zitadel-configurator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get","list","create","update","delete","patch"]
