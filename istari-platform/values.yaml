  secretName: "istari-identity-service"
  # -- Extra secrets to mount in the pod. The secrets should contain the environment variables required by the service.
  extraEnvSecrets: []
  # -- Replica count
  replicaCount: 1
  # -- Restart policy
  restartPolicy: "Always"
  # -- Additional labels to add to all of this service's resources
  commonLabels: {}
  # -- Service Type. Available options are ClusterIP, NodePort, LoadBalancer, ExternalName.
  serviceType: "ClusterIP"
  # -- Additional annotations to apply to the service, note the following annotations for duplicate keys.
  serviceAnnotations: {}
  # -- Additional annotations to add to the deployment
  deploymentAnnotations: {}
  # -- Additional annotations to add to pods
  podAnnotations: {}
  # -- Additional labels to add to pods
  podLabels: {}
  # -- Pod security context
  podSecurityContext:
    fsGroup: 65532
  # -- Primary container's security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 65532
  # -- Additional annotations to apply to the service account
  serviceAccountAnnotations: {}
  # Environment variables
  ###############################
  # example:
  # env:
  # - name: IDENTITY_SERVICE_LOG_LEVEL
  #   value: DEBUG
  ###############################
  # If you are using secrets, you can use the following format:
  # env:
  # - name: IDENTITY_SERVICE_LOG_LEVEL
  #   valueFrom:
  #     secretKeyRef:
  #       name: istari-identity-service
  #       key: IDENTITY_SERVICE_LOG_LEVEL
  env: []
  # Autoscaling -- set autoscaling (HPA) parameters
  autoscaling:
    # -- Enable/Disable autoscaling
    enabled: false
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 2
    # -- Average CPU utilization percentage. Set to `null` to disable.
    cpuUtilization: 80
    # -- Average Memory utilization percentage. Set to `null` to disable.
    memoryUtilization: 80
  # Resources -- set resources
  resources: {}
  # -- Pod Volumes
  volumes: []
  # -- Volume Mounts for pod containers
  volumeMounts: []
  # -- Tolerations.
  # Example:
  #
  # ```
  # tolerations:
  # - "effect": "NoSchedule"
  #   "key": "istari.k8s.io/role"
  #   "operator": "Equal"
  #   "value": "main"
  # ```
  tolerations: []
  # -- Node selector
  nodeSelector: {}
  # -- Affinity
  affinity: {}
  migrations:
    # -- Run database migrations as a Helm `pre-install` / `pre-upgrade` Job instead of a Deployment `initContainer`.
    # When `true`, a `Job` runs `/migrate` once per release before the identity-service Deployment rolls out; the identity-service `ServiceAccount` and env `ConfigMap` are annotated with the same hooks so they exist before the Job runs.
    # When `false`, migrations run in an `initContainer` on each identity-service Pod before the main container starts (legacy behavior).
    runAsJob: false
    # -- `spec.backoffLimit` for the migration `Job` (number of retries after a failed Pod). `0` means no retries.
    backoffLimit: 0
    # -- Automatically clean up the successful migration hook `Job` by including **`hook-succeeded`** in `helm.sh/hook-delete-policy` (alongside `before-hook-creation`).
    # When `true`, Helm may remove the Job after the migration succeeds (less clutter; logs are shorter-lived on the cluster).
    # When `false`, only `before-hook-creation` is set, so the completed Job (and its Pods) remain until the next install or upgrade replaces the hook—useful for auditing or inspecting migration logs.
    autoCleanupSuccessfulJob: true
    # -- Annotations for the migration Job Pod template only (e.g. `sidecar.istio.io/inject: "false"` to disable Istio sidecar injection).
    podAnnotations: {}
    # -- Extra labels for the migration Job Pod template only (in addition to the standard identity-service labels).
    podLabels: {}
    # -- Resources for migration containers, used by both the Deployment `initContainer` and the Helm hook `Job`.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 1Gi
  # -- Settings for the `register-client` one-shot hook Job (pre-install/pre-upgrade) that registers the registry-service's identity-service client in the identity-service ClientStore (required once the deployed identity-service image enforces client authentication on `/oauth/v2/introspect`). The Job is rendered only when BOTH `identityService.enabled` and `identityService.identityRouterClientRegistration.enabled` are `true`. It reads both `ISTARI_DIGITAL_IDENTITY_SERVICE_REGISTRY_CLIENT` (the public-only client blob) and `ISTARI_DIGITAL_IDENTITY_SERVICE_DATABASE_URL` from `identityService.secretName`, so the identity-service never needs read access to the registry-service's secret.
  # @default -- (see fields below)
  identityRouterClientRegistration:
    # -- Whether to render the registration Job. Off by default: only enable in environments where the registry-service identity-service integration is turned on (so `identityService.secretName` actually contains `ISTARI_DIGITAL_IDENTITY_SERVICE_REGISTRY_CLIENT`). Otherwise the hook Job fails the release with a missing-secret-key error.
    enabled: false
    # -- `spec.backoffLimit` for the registration Job (number of retries after a failed Pod).
    backoffLimit: 6
    # -- Automatically clean up the successful registration hook `Job` by including **`hook-succeeded`** in `helm.sh/hook-delete-policy` (alongside `before-hook-creation`).
    autoCleanupSuccessfulJob: true
    # -- Annotations for the registration Job Pod template only (in addition to `sidecar.istio.io/inject: "false"`).
    podAnnotations: {}
    # -- Extra labels for the registration Job Pod template only.
    podLabels: {}
    # -- Resources for the registration Job container.
    resources: {}
  # -- Settings for the agent-registration one-shot hook Jobs (pre-install/pre-upgrade). For each entry in `agents`, one Job runs `create-tenant` (idempotent, as an init container) and then `register-agent`, provisioning a service principal's tenant and public key in the identity-service. Used to onboard autonomous service agents that authenticate to the identity-service via `client_credentials` (e.g. the secure-connection-service, DPLAT-513). Rendered only when BOTH `identityService.enabled` and `identityService.agentRegistration.enabled` are `true` AND `agents` is non-empty. Each agent's public-key blob and the `ISTARI_DIGITAL_IDENTITY_SERVICE_DATABASE_URL` are read from `identityService.secretName`, so the identity-service never needs read access to another service's secret and is never handed private key material. The Job pods inherit the identity-service's `nodeSelector`, `affinity`, `tolerations`, security contexts, and image-pull secrets; only `podAnnotations`, `podLabels`, and `resources` are configured separately here.
  # @default -- (see fields below)
  agentRegistration:
    # -- Whether to render the agent-registration Jobs. Off by default. Safe to leave enabled across environments: the referenced secret keys are mounted `optional`, and when an agent's key blob is absent from `identityService.secretName` (e.g. the identity-router client integration is disabled and its secrets are not provisioned) the Job no-ops for that agent instead of failing the release — so the presence of the secret, not this flag, is the effective on/off switch. Enable it once and toggle the integration by provisioning (or not) the secret.
    enabled: false
    # -- `spec.backoffLimit` for each registration Job (retries after a failed Pod).
    backoffLimit: 6
    # -- Automatically clean up successful registration hook `Job`s by including **`hook-succeeded`** in `helm.sh/hook-delete-policy` (alongside `before-hook-creation`).
    autoCleanupSuccessfulJob: true
    # -- Annotations for the registration Job Pod templates only (in addition to `sidecar.istio.io/inject: "false"`).
    podAnnotations: {}
    # -- Extra labels for the registration Job Pod templates only.
    podLabels: {}
    # -- Resources for the registration Job containers.
    resources: {}
    # -- Agents to provision, one Job each. Fields per entry: `name` (required, DNS-safe identifier used in the Job name); `tenantSlug` (required, identity-service tenant the agent belongs to); `keySecretKey` (required, the key within `identityService.secretName` holding the base64-encoded public-only agent credential blob); `tenantDisplayName` (optional human-readable tenant name); `providerName` (optional; required alongside a provider tenant; the upstream IdP name, e.g. `zitadel`); the provider tenant (org) and the bound username may each be given literally OR sourced from a secret key — prefer the secret form so environment-specific upstream ids stay out of values (the istari-zitadel-configurator publishes them). For the org: either `providerTenantId` (literal Zitadel org id) or `providerTenantIdSecretKeyRef: {name, key}`; it maps the tenant to the upstream org so the agent's token carries the resourceowner for Zitadel-namespaced role lookups. For the binding: either `username` (literal upstream user id) or `usernameSecretKeyRef: {name, key}`; binds the agent to a pre-existing IdP identity — required for agents that rely on an existing Zitadel project grant such as the secure-connection-service's `rss_service_user` role. `displayName` (optional agent name claim). Literal and secretKeyRef are mutually exclusive per field.
    agents: []
  # Ingress -- optional Kubernetes Ingress for this service.
  ingress:
    # -- Create a Kubernetes Ingress for this service. The cluster must have an Ingress controller (nginx, ALB / EKS Auto Mode, GCE, Traefik, etc.) that watches the chosen IngressClass.
    enabled: false
    # -- `ingressClassName` on the Ingress. Leave empty to use the cluster's default IngressClass.
    className: ""
    # -- Annotations on the Ingress. Use this for controller-specific behavior (cert-manager, nginx, ALB, etc.).
    annotations: {}
    # -- Additional labels on the Ingress (in addition to the standard identity-service labels).
    labels: {}
    # -- One entry per `spec.rules[]`. `host` is optional — when omitted, the rule matches any host.
    hosts:
    - host: identity-service.istari.customer-domain.com
      paths:
      - path: /
        pathType: Prefix
    # -- TLS configuration; passed through to `spec.tls[]` verbatim.
    tls: []
    # -- Service port the Ingress targets. Defaults to 80.
    servicePort: 80
  # VirtualService -- optional Istio VirtualService for this service. The chart generates a single HTTP route sending all traffic (for the listed `hosts`) to this service's `kind: Service` on port 80. For custom routing logic (URL rewriting, retries, CORS, etc.), create a separate VirtualService alongside this chart.
  virtualService:
    # -- Create an Istio VirtualService for this service. Requires Istio installed in the cluster with the `networking.istio.io/v1` CRD (Istio 1.22+).
    enabled: false
    # -- Additional labels on the VirtualService (in addition to the standard identity-service labels).
    labels: {}
    # -- Annotations on the VirtualService.
    annotations: {}
    # -- `spec.hosts[]` — DNS names this VirtualService matches (FQDNs, or short names for mesh-internal traffic). The default below is an EXAMPLE — you MUST replace it with your actual hostname(s) before enabling the VirtualService. Clearing this list while `enabled: true` will cause the chart to fail to render.
    hosts:
    - identity-service.example.com
    # -- `spec.gateways[]` — Gateway resources to attach to. Use `<namespace>/<gateway-name>` to reference a Gateway in another namespace. Leave empty for mesh-internal traffic only.
    gateways: []

