# Optional NATS messaging deployment. Configured as a Helm subchart (https://github.com/nats-io/k8s/tree/main/helm/charts/nats).
#
# BETA: NATS integration is currently in beta and disabled by default. It will eventually become a required component of the istari-platform deployment; the `nats.enabled: false` default will be flipped and this section will lose its "optional" framing in a future release.
#
# When `nats.enabled: true`, this chart deploys NATS in-cluster AND automatically injects the `FILE_SERVICE_NATS_URL` and `FILE_SERVICE_ALLOWED_IDS_CACHE_ENABLED` environment variables into the fileservice (registry-service) Pods so they can connect to it. The NATS auth token is NOT injected automatically — you remain responsible for providing it (see below).
#
# Two things you must do yourself before enabling NATS:
#   1. Create the Kubernetes Secret that the NATS Pod reads its auth token from. The Secret reference lives at `nats.container.env.NATS_AUTH_TOKEN.valueFrom.secretKeyRef` (default: a Secret named `istari-nats` with key `NATS_AUTH_TOKEN`). The value of `nats.config.merge.authorization.token` below is just a `<< $NATS_AUTH_TOKEN >>` placeholder that NATS substitutes from that env var at startup — overriding it directly will not change which Secret NATS reads.
#   2. Add `FILE_SERVICE_NATS_TOKEN` (with the same token value) to the Secret consumed by fileservice (default: `istari-fileservice`, configurable via `fileservice.secretName`). The chart sets `FILE_SERVICE_NATS_URL` for you, but the token is sourced from your fileservice Secret.
#
# Every key under `nats:` here is passed directly to the NATS subchart. See the upstream chart's `values.yaml` for the full schema.
nats:
  # -- Enable / Disable the NATS subchart. **Beta** — currently optional but will become required in a future release. When `false`, the subchart is not rendered at all and no NATS env vars are injected into fileservice.
  enabled: false
  # -- Override the NATS resource name prefix. With the default `nats`, the in-cluster Service is reachable at `nats://nats:4222` (the URL this chart injects as `FILE_SERVICE_NATS_URL`). Change this only if you also override `fileservice.env` with a matching URL.
  fullnameOverride: "nats"
  global:
    image:
      # -- Image pull secret names applied to every Pod created by the NATS subchart. The umbrella chart's top-level `imagePullSecrets` does not propagate to subcharts, so this is set explicitly. Defaults to `docker-pull-secret` to match the rest of the istari-platform chart.
      pullSecretNames:
      - docker-pull-secret
  config:
    cluster:
      # -- Enable NATS clustering for HA. Defaults to `true` to match the production deployment pattern.
      enabled: true
    jetstream:
      # -- Enable JetStream (NATS persistence layer). Required by fileservice.
      enabled: true
    merge:
      authorization:
        # -- NATS auth token. The `<< $NATS_AUTH_TOKEN >>` placeholder is substituted at startup with the value of the `NATS_AUTH_TOKEN` env var (set below from your Kubernetes Secret).
        token: "<< $NATS_AUTH_TOKEN >>"
  container:
    image:
      # -- NATS server image repository. Defaults to the Chainguard FIPS variant in the Istari customer-docker JFrog repo.
      repository: "istaridigital.jfrog.io/customer-docker/istaridigital.com/nats-fips"
      # -- NATS server image tag.
      tag: "2.14.1"
    # -- Container env. The `NATS_AUTH_TOKEN` value is wired to the user-managed Secret (default: `istari-nats` / key `NATS_AUTH_TOKEN`). Override `secretKeyRef.name` and `secretKeyRef.key` if your Secret uses a different name or key.
    env:
      NATS_AUTH_TOKEN:
        valueFrom:
          secretKeyRef:
            name: istari-nats
            key: NATS_AUTH_TOKEN
  reloader:
    # -- Deploy the NATS config-reloader sidecar (recommended). Reloads NATS config on ConfigMap changes without restarting the StatefulSet.
    enabled: true
    image:
      # -- Config-reloader image repository. Defaults to the Chainguard FIPS variant.
      repository: "istaridigital.jfrog.io/customer-docker/istaridigital.com/nats-server-config-reloader-fips"
      # -- Config-reloader image tag.
      tag: "0.23.0"
  promExporter:
    # -- Deploy the NATS Prometheus exporter sidecar. Enable when scraping NATS metrics via a PodMonitor/ServiceMonitor.
    enabled: false
    image:
      # -- Prometheus exporter image repository. Defaults to the Chainguard FIPS variant.
      repository: "istaridigital.jfrog.io/customer-docker/istaridigital.com/prometheus-nats-exporter-fips"
      # -- Prometheus exporter image tag.
      tag: "0.19.2"
  natsBox:
    # -- Deploy the `nats-box` utility container (lightweight client for debugging from inside the cluster).
    enabled: true
    container:
      image:
        # -- nats-box image repository. Defaults to the Chainguard FIPS variant.
        repository: "istaridigital.jfrog.io/customer-docker/istaridigital.com/nats-box-fips"
        # -- nats-box image tag.
        tag: "0.19.5"
  statefulSet:
    merge:
      spec:
        # -- Delete the JetStream PVCs when the StatefulSet is deleted or scaled down. Set to `Retain` if you need the data to outlive the StatefulSet.
        persistentVolumeClaimRetentionPolicy:
          whenDeleted: "Delete"
          whenScaled: "Delete"
  podTemplate:
    merge:
      spec:
        # -- `securityContext` applied to NATS Pods. `fsGroup: 65532` matches the rest of the chart so JetStream PVCs are writable by the non-root NATS user.
        securityContext:
          fsGroup: 65532

# Optional Jaeger APM deployment. Configured as a Helm subchart (https://github.com/jaegertracing/helm-charts/tree/main/charts/jaeger), deploying Jaeger v2 as a single all-in-one Pod (OTLP ingest + query UI).
#
# When `jaeger.enabled: true`, this chart deploys Jaeger in-cluster AND automatically injects the `OTEL_*` exporter/identity env vars, plus each service's enable flag (`FILE_SERVICE_OPENTELEMETRY_ENABLED` / `ISTARI_DIGITAL_IDENTITY_SERVICE_OTEL_ENABLED`), into the main container, init container, and migration Job of fileservice (registry-service; OTLP gRPC, `http://jaeger:4317`) and identity-service (OTLP/HTTP, `http://jaeger:4318`). Each workload gets its own service name, `<service>.<subservice>` (e.g. `registry-service.web`, `identity-service.db-migrate`), plus a matching `k8s.container.name` resource attribute, so web traffic, migrations, and init runs are distinguishable in the Jaeger UI. identity-service's register-client hook Job is not wired (it does not initialize the OTEL SDK).
#
# The injected values are DEFAULTS delivered via each service's ConfigMap listed first in `envFrom`: the same variable set in the service's Secret (`secretName`), `extraEnvSecrets`, or explicit `env` values wins — so to send APM elsewhere, set `OTEL_EXPORTER_OTLP_ENDPOINT` through any of those. One exception: the per-workload `OTEL_SERVICE_NAME` / `OTEL_RESOURCE_ATTRIBUTES` in init containers and migration Jobs are explicit env (a shared ConfigMap cannot vary per container) and are overridable only via the service's `env` values, not via Secrets.
#
# Traces are stored in Badger (Jaeger's embedded storage) on a PersistentVolumeClaim created by this chart (see `jaeger.persistence`), with a 72h span retention TTL. Badger is single-writer: keep `replicas` at 1. The Jaeger UI is not exposed outside the cluster; the post-install notes print the exact `kubectl port-forward` command (the Service name follows `jaeger.fullnameOverride`, default `jaeger`).
#
# Every key under `jaeger:` is passed to the Jaeger subchart (see the upstream chart's `values.yaml` for the full schema); `jaeger.persistence` is additionally consumed by this umbrella chart to create the Badger PVC (the subchart ignores it).
jaeger:
  # -- Enable / Disable the Jaeger subchart. When `false`, the subchart is not rendered at all and no OTEL env vars are injected into fileservice or identity-service.
  enabled: false
  # -- Override the Jaeger resource name prefix. With the default `jaeger`, the in-cluster OTLP endpoints are `http://jaeger:4317` (gRPC) and `http://jaeger:4318` (HTTP). The injected `OTEL_EXPORTER_OTLP_ENDPOINT` values and the post-install notes track this override automatically.
  fullnameOverride: "jaeger"
  # Settings for the all-in-one Jaeger Deployment created by the subchart.
  jaeger:
    image:
      # -- Jaeger image registry. Defaults to the Istari customer-docker JFrog repo.
      registry: "istaridigital.jfrog.io/customer-docker"
      # -- Jaeger image repository. Defaults to the Chainguard FIPS variant of Jaeger v2 (the `2.x` tags of this repo are the Jaeger v2 binary).
      repository: "istaridigital.com/jaeger-all-in-one-fips"
      # -- Jaeger image tag.
      tag: "2.17.0"
      # -- Image pull secret names applied to the Jaeger Pod. The umbrella chart's top-level `imagePullSecrets` does not propagate to subcharts, so this is set explicitly. Defaults to `docker-pull-secret` to match the rest of the istari-platform chart.
      pullSecrets:
      - docker-pull-secret
    # -- Extra env for the Jaeger container. `OTEL_TRACES_SAMPLER=always_off` disables Jaeger v2's self-tracing: the OpenTelemetry Collector SDK inside Jaeger otherwise traces its own query/ingest operations, storing them alongside real traces (every UI search generates `jaeger` spans) and exporting them to any external OTLP destination (e.g. an OpenTelemetry Collector fanning traces out to Datadog). Ingestion of application traces is unaffected — the sampler only governs Jaeger's own internal SDK. Remove this entry if you need Jaeger's internal traces to debug Jaeger itself.
    extraEnv:
    - name: OTEL_TRACES_SAMPLER
      value: "always_off"
    # -- Container `securityContext` for the Jaeger container, matching the hardening applied to the rest of the istari-platform chart. The subchart's default Pod-level securityContext (uid/gid/fsGroup 10001) is kept so the Badger PVC is writable by the non-root user.
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
    # -- Volumes for the Badger storage directories. References the `jaeger-badger` PVC created by this chart when `jaeger.persistence.enabled` is true — keep the claim name in sync if you change `jaeger.persistence`.
    extraVolumes:
    - name: badger-data
      persistentVolumeClaim:
        claimName: jaeger-badger
    # -- Mounts the Badger storage volume at the path referenced by `jaeger.userconfig`.
    extraVolumeMounts:
    - name: badger-data
      mountPath: /badger
  # -- Jaeger v2 configuration (passed to the binary via `--config`). REQUIRED: without a config file Jaeger v2 binds OTLP to localhost only (unreachable from other Pods) and serves no health endpoint on port 13133, so the subchart's probes would crash-loop the Pod. This default enables OTLP gRPC/HTTP ingest on all interfaces, the query UI, and Badger storage with a 72h span TTL. To use ephemeral in-memory storage instead: replace the `badger:` block with `memory: {max_traces: 100000}`, set `jaeger.jaeger.extraVolumes`/`extraVolumeMounts` to `[]`, and set `jaeger.persistence.enabled: false`.
  userconfig:
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
      jaeger_query:
        storage:
          traces: primary_store
      jaeger_storage:
        backends:
          primary_store:
            badger:
              directories:
                keys: /badger/keys
                values: /badger/values
              ephemeral: false
              ttl:
                spans: 72h
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      jaeger_storage_exporter:
        trace_storage: primary_store
  # Badger storage PVC. These keys are consumed by the umbrella chart itself (templates/jaeger/pvc.yaml), NOT by the Jaeger subchart.
  persistence:
    # -- Create a PersistentVolumeClaim named `jaeger-badger` for Badger trace storage. The PVC is deleted on `helm uninstall` (trace history is disposable). Note: block-storage PVCs are zonal on AWS/Azure — the Jaeger Pod becomes pinned to the volume's availability zone (on Azure, a ZRS storage class avoids this). Disable only if you also switch `jaeger.userconfig` to in-memory storage and set `jaeger.jaeger.extraVolumes` / `jaeger.jaeger.extraVolumeMounts` to `[]` (see the `jaeger.userconfig` comment for the full recipe; the chart refuses to render a half-configured state).
    enabled: true
    # -- Size of the Badger PVC. Retention is TIME-based only (`ttl.spans` in `jaeger.userconfig`, default 72h): Badger does NOT evict old data under disk pressure. A full volume stops trace collection and can wedge Badger's garbage collection (reclaiming space itself needs free disk), potentially crash-looping the Pod. Size with headroom — 10Gi over 72h ≈ 40 KB/s of stored spans, and expired data is reclaimed lazily — and alert on PVC usage (`kubelet_volume_stats_used_bytes`) around 80%. Increasing this value expands the volume in place when the StorageClass allows expansion; to reduce trace volume, lower `ttl.spans` or sample at the source. Trace history is disposable: deleting the PVC and restarting the Pod is a valid recovery.
    size: 10Gi
    # -- StorageClass for the Badger PVC. Empty string uses the cluster's default StorageClass.
    storageClassName: ""
    # -- Additional annotations for the Badger PVC.
    annotations: {}

# Optional dgraph-sec database deployment. Configured as a Helm subchart (Istari-digital/charts/dgraph-sec).
#
# When `dgraph-sec.enabled: true`, this chart deploys dgraph-sec in-cluster. ACL secrets, S3 backup
# buckets, and Pod Identity are provisioned outside this chart (in the `istari` namespace) before install.
#
# Every key under `dgraph-sec:` here is passed directly to the dgraph-sec subchart. See
# https://github.com/Istari-digital/charts/blob/main/dgraph-sec/values.yaml for the full values schema
# and configuration options.
dgraph-sec:
  # -- Enable / Disable the dgraph-sec subchart. When `false`, the subchart is not rendered at all.
  enabled: false
  # -- Override the resource name prefix. Production uses `dgraph-sec` so Services are `dgraph-sec-alpha`, etc.
  fullnameOverride: "dgraph-sec"
  imagePullSecrets:
  - name: docker-pull-secret
  image:
    registry: istaridigital.jfrog.io
    repository: main-docker-local/dgraph-sec
    tag: v25.3.7-sec.0.2.2
  preUpgradeHook:
    enabled: false
  zero:
    replicaCount: 3
    logLevel: normal
    shardReplicaCount: 3
    antiAffinity: hard
    # -- Node selector for zero pod scheduling.
    nodeSelector: {}
    # -- Tolerations for zero pod scheduling.
    tolerations: []
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 2Gi
    persistence:
      # -- Enable persistent storage for zero data.
      enabled: false
      # Example when enabling persistence:
      # size: 32Gi
      # storageClass: ""
      # persistentVolumeClaimRetentionPolicy:
      #   whenDeleted: Delete  # or Retain
      #   whenScaled: Delete    # or Retain
  alpha:
    replicaCount: 3
    logLevel: normal
    antiAffinity: hard
    # -- Node selector for alpha pod scheduling.
    nodeSelector: {}
    # -- Tolerations for alpha pod scheduling.
    tolerations: []
    acl:
      # -- Enable Dgraph ACL on alpha (--acl secret-file=…).
      enabled: false
      # -- Filename/key of the HMAC secret mounted at /dgraph/acl/<secretFile>.
      secretFile: hmac_secret_file
      # -- Pre-created Secret holding the HMAC; empty means the chart creates one from `file`.
      existingSecret: ""
      bootstrap:
        # -- Run the ACL bootstrap/reconciler Job.
        enabled: false
        # -- Secret holding groot and user passwords for the bootstrap Job.
        existingSecret: ""
        # -- Key in the Secret holding groot's rotated password.
        grootPasswordSecretKey: groot_password
        # -- Opaque rotation token to force re-running the reconciler on upgrade.
        rotation: ""
        # -- ACL groups to ensure, with predicate rules.
        groups: []
        # Example when enabling bootstrap:
        # users:
        # - name: admin
        #   passwordSecretKey: admin_password
        #   groups:
        #   - guardians
        users: []
    extraFlags: "--cache \"size-mb=4096; percentage=40,40,20;\""
    extraEnvs:
    - name: GOGC
      value: "50"
    - name: GOMEMLIMIT
      value: 8GiB
    resources:
      requests:
        cpu: 2000m
        memory: 10Gi
      limits:
        memory: 10Gi
    persistence:
      # -- Enable persistent storage for alpha data.
      enabled: false
      # Example when enabling persistence:
      # size: 100Gi
      # storageClass: ""
      # persistentVolumeClaimRetentionPolicy:
      #   whenDeleted: Delete  # or Retain
      #   whenScaled: Delete    # or Retain
  ratel:
    enabled: false
  backups:
    full:
      enabled: true
      schedule: "0 0 * * *"
    incremental:
      enabled: true
      schedule: "0 1-23 * * *"
