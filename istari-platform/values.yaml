    # -- Maximum number of replicas
    maxReplicas: 3
    # -- Average CPU utilization percentage. Set to `null` to disable.
    cpuUtilization: 80
    # -- Average Memory utilization percentage. Set to `null` to disable.
    memoryUtilization: 80
  # Resources -- set resources
  resources: {}
  # -- Tolerations.
  # Example:
  #
  # ```
  # tolerations:
  # - "effect": "NoSchedule"
  #   "key": "istari.k8s.io/role"
  #   "operator": "Equal"
  #   "value": "main"
  # ```
  # -- Pod Volumes
  volumes: []
  # -- Volume Mounts for pod containers
  volumeMounts: []
  # -- Tolerations.
  # Example:
  #
  # ```
  # tolerations:
  # - "effect": "NoSchedule"
  #   "key": "istari.k8s.io/role"
  #   "operator": "Equal"
  #   "value": "main"
  # ```
  tolerations: []
  # -- Node selector
  nodeSelector: {}
  # -- Affinity
  affinity: {}

