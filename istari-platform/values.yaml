# Default values for the istari-platform Helm chart.

# This is a YAML-formatted file.

# -- Additional labels to add to all resources of all services
commonLabels: {}

# -- Override the prefix used for resource names, which defaults to the chart name (istari-platform).
fullnameOverride: "istari"

imagePullSecrets:
- name: "docker-pull-secret"

# -- Override the value used for the label 'app.kubernetes.io/name', which defaults to the chart name (istari-platform).
nameOverride: ""

# -- Optional: Trusted certificate bundle for when using a self-signed certificate. This is a PEM-encoded certificate bundle. AWS, Azure, and GCP root certs will also automatically be trusted.
trustedCertBundle: ""
# # Example:
# trustedCertBundle: |-
#   -----BEGIN CERTIFICATE-----
#   MIID1z...
#   ...
#   -----END CERTIFICATE-----
#   -----BEGIN CERTIFICATE-----
#   MIIEvj...
#   ...
#   -----END CERTIFICATE-----

# Default values for Fileservice.
fileservice:
  # -- Enable / Disable the whole deployment
  enabled: true
  # -- Registry URL for images. The combination of registry, image, and tag will be used to pull the image.
  registry: "istaridigital.jfrog.io/customer-docker"
  # -- Image name. The combination of registry, image, and tag will be used to pull the image.
  image: "fileservice2"
  # -- Image tag. The combination of registry, image, and tag will be used to pull the image.
  tag: "10.12.10"
  # -- Image pull policy
  imagePullPolicy: "IfNotPresent"
  # -- Secret name. The secret should contain the environment variables required by the service.
  secretName: "istari-fileservice"
  # -- Extra secrets to mount in the pod. The secrets should contain the environment variables required by the service.
  extraEnvSecrets: []
  # -- Replica count
  replicaCount: 1
  # -- Restart policy
  restartPolicy: "Always"
  # -- Additional labels to add to all of this service's resources
  commonLabels: {}
  # -- Service Type. Available options are ClusterIP, NodePort, LoadBalancer, ExternalName.
  serviceType: "ClusterIP"
  # -- Additional annotations to apply to the service, note the following annotations for duplicate keys.
  serviceAnnotations: {}
  # -- Prometheus autodiscovery annotations. If true, the following annotations will be added to the service
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8000"
  # prometheus.io/path: "/stats/prometheus"
  prometheusAutodiscoveryAnnotations: true  # if true, the following annotations will be added to the service
  # -- Additional annotations to add to the deployment
  deploymentAnnotations: {}
  # -- Additional annotations to add to pods
  podAnnotations: {}
  # -- Additional labels to add to pods
  podLabels: {}
  # -- Pod security context
  podSecurityContext:
    fsGroup: 65532
  # -- Primary container's security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 65532
  # -- Additional annotations to apply to the service account
  serviceAccountAnnotations: {}
  # Environment variables
  ###############################
  # example:
  # env:
  # - name: FILE_SERVICE_LOG_LEVEL
  #   value: DEBUG
  ###############################
  # If you are using secrets, you can use the following format:
  # env:
  # - name: FILE_SERVICE_LOG_LEVEL
  #   valueFrom:
  #     secretKeyRef:
  #       name: istari-fileservice
  #       key: FILE_SERVICE_LOG_LEVEL
  env: []
  # Autoscaling -- set autoscaling (HPA) parameters
  autoscaling:
    # -- Enable/Disable autoscaling
    enabled: false
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 2
    # -- Average CPU utilization percentage. Set to `null` to disable.
    cpuUtilization: 80
    # -- Average Memory utilization percentage. Set to `null` to disable.
    memoryUtilization: 80
  # Resources -- set resources
  resources: {}
  # -- Pod Volumes
  volumes: []
  # -- Volume Mounts for pod containers
  volumeMounts: []
  # -- Tolerations.
  # Example:
  #
  # ```
  # tolerations:
  # - "effect": "NoSchedule"
  #   "key": "istari.k8s.io/role"
  #   "operator": "Equal"
  #   "value": "main"
  # ```
  tolerations: []
  # -- Node selector
  nodeSelector: {}
  # -- Affinity
  affinity: {}
  migrations:
    # -- Run Alembic database migrations as a Helm `pre-install` / `pre-upgrade` Job instead of a Deployment `initContainer`.
    # When `true`, a `Job` runs `alembic upgrade head` once per release before the fileservice Deployment rolls out; the fileservice `ServiceAccount` is annotated with the same hooks so it exists before the Job runs.
    # When `false`, migrations run in an `initContainer` on each fileservice Pod before the main container starts (legacy behavior).
    runAsJob: false
    # -- `spec.backoffLimit` for the migration `Job` (number of retries after a failed Pod). `0` means no retries.
    backoffLimit: 0
    # -- Automatically clean up the successful migration hook `Job` by including **`hook-succeeded`** in `helm.sh/hook-delete-policy` (alongside `before-hook-creation`).
    # When `true`, Helm may remove the Job after the migration succeeds (less clutter; logs are shorter-lived on the cluster).
    # When `false`, only `before-hook-creation` is set, so the completed Job (and its Pods) remain until the next install or upgrade replaces the hook—useful for auditing or inspecting migration logs.
    autoCleanupSuccessfulJob: true
    # -- Annotations for the migration Job Pod template only (e.g. `sidecar.istio.io/inject: "false"` to disable Istio sidecar injection).
    podAnnotations: {}
    # -- Extra labels for the migration Job Pod template only (in addition to the standard fileservice labels).
    podLabels: {}

