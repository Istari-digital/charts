  # -- Node selector
  nodeSelector: {}
  # -- Affinity
  affinity: {}
  # Ingress -- optional Kubernetes Ingress for this service.
  ingress:
    # -- Create a Kubernetes Ingress for this service. The cluster must have an Ingress controller (nginx, ALB / EKS Auto Mode, GCE, Traefik, etc.) that watches the chosen IngressClass.
    enabled: false
    # -- `ingressClassName` on the Ingress. Leave empty to use the cluster's default IngressClass (the one annotated `ingressclass.kubernetes.io/is-default-class: "true"`).
    className: ""
    # -- Annotations on the Ingress. Use this for controller-specific behavior: cert-manager (`cert-manager.io/cluster-issuer`), nginx (`nginx.ingress.kubernetes.io/*`), ALB (`alb.ingress.kubernetes.io/scheme`, `target-type`, `certificate-arn`, `group.name`, `group.order`), etc.
    annotations: {}
    # -- Additional labels on the Ingress (in addition to the standard frontend labels).
    labels: {}
    # -- One entry per `spec.rules[]`. `host` is optional — when omitted, the rule matches any host (per the Kubernetes Ingress API and the EKS Auto Mode ALB example).
    hosts:
    - host: istari.customer-domain.com
      paths:
      - path: /
        pathType: Prefix
    # Host-less catch-all (e.g. for ALB) — uncomment as a sibling list item under `hosts:`:
    # - paths:
    #   - path: /*
    #     pathType: ImplementationSpecific
    # -- TLS configuration; passed through to `spec.tls[]` verbatim. Secrets must exist (or be created via cert-manager annotations).
    tls: []
    # -- Service port the Ingress targets. Defaults to 80, the port every service in this chart exposes.
    servicePort: 80
  # VirtualService -- optional Istio VirtualService for this service. The chart generates a single HTTP route sending all traffic (for the listed `hosts`) to this service's `kind: Service` on port 80. For custom routing logic (URL rewriting, retries, CORS, etc.), create a separate VirtualService alongside this chart.
