{{- if .Values.trustedCertBundle }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shared.trustedCerts.name" . | quote }}
  labels:
    {{- include "shared.labels" . | nindent 4 }}
  {{- if or (and .Values.fileservice.enabled (dig "migrations" "runAsJob" false .Values.fileservice)) (and .Values.secureConnection.enabled (dig "migrations" "runAsJob" false .Values.secureConnection)) (and .Values.identityService.enabled (dig "migrations" "runAsJob" false .Values.identityService)) (and .Values.identityService.enabled (dig "identityRouterClientRegistration" "enabled" false .Values.identityService)) }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
  {{- end }}
data:
  {{- /*
  We include AWS, Microsoft, and GCP root certificates from:
  https://www.amazontrust.com/repository/
  https://learn.microsoft.com/en-us/azure/security/fundamentals/azure-ca-details?tabs=root-and-subordinate-cas-list
  https://pki.goog/repository/
  */}}
  bundle.crt: |-
    # User-defined trusted cert bundle
{{ .Values.trustedCertBundle | indent 4 }}

{{ .Files.Get "files/cloud-provider-trusted-bundles.pem" | indent 4 }}
{{- end }}
