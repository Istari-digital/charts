{{- $serviceValues := .Values.fileservice -}}
{{- if $serviceValues.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fileservice.fullname" . | quote }}
  labels:
    {{- include "fileservice.labels" . | nindent 4 }}
  {{- if or (dig "migrations" "runAsJob" false $serviceValues) $serviceValues.serviceAccountAnnotations }}
  annotations:
    {{- if dig "migrations" "runAsJob" false $serviceValues }}
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    {{- end }}
    {{- with $serviceValues.serviceAccountAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
