{{- $serviceValues := .Values.fileservice -}}
{{- $jaegerEnabled := dig "enabled" false (default dict .Values.jaeger) -}}
{{/*
Default OTEL env for exporting fileservice APM to in-cluster Jaeger. Referenced FIRST in the
consumers' `envFrom` so the user's Secret(s) and `fileservice.env` override every value here
(precedence contract: see the `jaeger:` section comment in values.yaml).
*/}}
{{- if and $serviceValues.enabled $jaegerEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fileservice.otelConfigMap.name" . | quote }}
  labels:
    {{- include "fileservice.labels" . | nindent 4 }}
  {{- if dig "migrations" "runAsJob" false $serviceValues }}
  {{- /* The migration Job is a pre-install/pre-upgrade hook (weight 5) that consumes this
  ConfigMap via envFrom, and hooks run before regular resources exist. Registering the
  ConfigMap as an earlier hook (same convention as the shared trusted-certs ConfigMap)
  ensures it exists before the Job starts; Helm's default before-hook-creation delete
  policy keeps it in place between upgrades. */}}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
  {{- end }}
data:
  FILE_SERVICE_OPENTELEMETRY_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "istari-platform.jaeger.otlpUrl" . | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  {{- /* Web-container identity; init-db/db-migrate override via "istari-platform.otelWorkloadEnv".
  `istari-platform` is the main container's actual name in the Pod spec. */}}
  OTEL_SERVICE_NAME: "registry-service.web"
  OTEL_RESOURCE_ATTRIBUTES: "k8s.container.name=istari-platform"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_METRICS_EXPORTER: "none"
{{- end }}
