{{- $serviceValues := .Values.router -}}
{{- if $serviceValues.enabled }}
{{- if $serviceValues.autoscaling.enabled }}
{{- if not (or $serviceValues.autoscaling.cpuUtilization $serviceValues.autoscaling.memoryUtilization) }}
{{- fail "router.autoscaling is enabled but cpuUtilization and memoryUtilization are both null — set at least one so the HPA has a metric to scale on" }}
{{- end }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "router.fullname" . | quote }}
  labels:
    {{- include "router.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "router.fullname" . | quote }}
  minReplicas: {{ $serviceValues.autoscaling.minReplicas }}
  maxReplicas: {{ $serviceValues.autoscaling.maxReplicas }}
  metrics:
  {{- if $serviceValues.autoscaling.cpuUtilization }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $serviceValues.autoscaling.cpuUtilization }}
  {{- end }}
  {{- if $serviceValues.autoscaling.memoryUtilization }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ $serviceValues.autoscaling.memoryUtilization }}
  {{- end }}
{{- end }}
{{- end }}
