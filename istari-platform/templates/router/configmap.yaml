{{- /*
Proxy configuration for the Service Router, rendered from the route table in
"router.routes" (see _helpers.tpl: chart-managed routes plus validated
`router.extraRoutes`, sorted longest-prefix-first). Each route declares a matcher
covering the bare prefix and its subtree, strips the prefix, and forwards to the
in-cluster Service; the backends serve these paths at root. A final catch-all
returns 404 so an unmatched path is never proxied blindly.

The config is mounted into the pod (not baked into the image) so the tracing option
can toggle the `tracing` directive — Caddy enables OTEL tracing only through its
config file, not through environment variables alone.

The proxy implementation (currently Caddy) is an internal detail: swapping it for
another sanctioned proxy (Envoy, nginx — see the service-router engspec) must not
change the chart's values interface beyond router.registry/image/tag.
*/}}
{{- $serviceValues := .Values.router -}}
{{- if $serviceValues.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "router.configmap.name" . | quote }}
  labels:
    {{- include "router.labels" . | nindent 4 }}
data:
  {{- /* The body below indents with TABS (after the 4-space YAML block indent) — the canonical `caddy fmt` style — so Caddy doesn't log a "Caddyfile input is not formatted" warning at startup. */}}
  Caddyfile: |
    {
    	# The admin API is unused: config changes roll the Deployment (see the
    	# checksum annotation), never reconfigure a live process.
    	admin off
    }

    :{{ $serviceValues.listen }} {
    {{- if eq (include "router.tracing.enabled" .) "true" }}
    	tracing

    {{- end }}
    	# Router self-health; used by the Deployment's liveness/readiness probes.
    	handle /healthz {
    		respond "OK" 200
    	}
    {{- range (include "router.routes" . | fromJsonArray) }}
    {{- /* Matcher names can't contain "/", so multi-segment prefixes flatten to dashes. */}}
    {{- $matcher := trimPrefix "/" .prefix | replace "/" "-" }}

    	@{{ $matcher }} path {{ .prefix }} {{ .prefix }}/*
    	handle @{{ $matcher }} {
    		uri strip_prefix {{ .prefix }}
    		reverse_proxy {{ .service }}:{{ .port }}
    	}
    {{- end }}

    	# Everything else: no route. Return 404 rather than proxying blindly.
    	handle {
    		respond "no route" 404
    	}
    }
{{- end }}
