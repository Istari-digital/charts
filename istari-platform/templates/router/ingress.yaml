{{- $serviceValues := .Values.router -}}
{{- if and $serviceValues.enabled $serviceValues.ingress.enabled }}
{{- if not $serviceValues.ingress.hosts -}}
{{- fail "router.ingress.hosts must contain at least one entry when router.ingress.enabled is true" -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "router.fullname" . | quote }}
  labels:
    {{- include "router.labels" . | nindent 4 }}
    {{- with $serviceValues.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $serviceValues.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $serviceValues.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with $serviceValues.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $serviceValues.ingress.hosts }}
    {{- if .host }}
    - host: {{ .host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType | quote }}
            backend:
              service:
                name: {{ include "router.fullname" $ | quote }}
                port:
                  number: {{ $serviceValues.ingress.servicePort | default 80 }}
          {{- end }}
    {{- end }}
{{- end }}
