{{- $serviceValues := .Values.secureConnection -}}
{{- if and $serviceValues.enabled $serviceValues.ingress.enabled }}
{{- if not $serviceValues.ingress.hosts }}
{{- fail "secureConnection.ingress.hosts must be a non-empty list when secureConnection.ingress.enabled=true. Set hosts: [...] in values, or set secureConnection.ingress.enabled=false." }}
{{- end }}
{{- range $idx, $h := $serviceValues.ingress.hosts }}
{{- if not $h.paths }}
{{- fail (printf "secureConnection.ingress.hosts[%d].paths must be a non-empty list when secureConnection.ingress.enabled=true." $idx) }}
{{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "secure-connection.fullname" . | quote }}
  labels:
    {{- include "secure-connection.labels" . | nindent 4 }}
    {{- with $serviceValues.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $serviceValues.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $serviceValues.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with $serviceValues.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $serviceValues.ingress.hosts }}
    {{- if .host }}
    - host: {{ .host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType | quote }}
            backend:
              service:
                name: {{ include "secure-connection.fullname" $ | quote }}
                port:
                  number: {{ $serviceValues.ingress.servicePort | default 80 }}
          {{- end }}
    {{- end }}
{{- end }}
