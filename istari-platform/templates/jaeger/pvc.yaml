{{- $jaegerValues := default dict .Values.jaeger -}}
{{/*
Badger trace-storage PVC for the Jaeger subchart. The claim name `jaeger-badger` is
intentionally static: the subchart consumes it via the literal claimName reference in the
`jaeger.jaeger.extraVolumes` default value, which Helm cannot compute dynamically.
Deleted on uninstall by design — trace history is disposable.
*/}}
{{- /* Fail fast on the half-configured state: persistence disabled but the Jaeger Pod still
mounting the (now uncreated) chart-managed claim would deploy a Pod stuck Pending. */}}
{{- if and (dig "enabled" false $jaegerValues) (not (dig "persistence" "enabled" false $jaegerValues)) }}
{{- range dig "jaeger" "extraVolumes" list $jaegerValues }}
{{- if eq (dig "persistentVolumeClaim" "claimName" "" .) "jaeger-badger" }}
{{- fail "jaeger.persistence.enabled is false, but jaeger.jaeger.extraVolumes still references the chart-managed `jaeger-badger` PVC (which will not be created). To use in-memory storage, follow the full recipe in the jaeger.userconfig comment: switch the userconfig storage backend to memory and set jaeger.jaeger.extraVolumes / extraVolumeMounts to []." }}
{{- end }}
{{- end }}
{{- end }}
{{- if and (dig "enabled" false $jaegerValues) (dig "persistence" "enabled" false $jaegerValues) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "jaeger-badger"
  labels:
    app.kubernetes.io/component: "jaeger"
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/name: {{ include "istari-platform.name" . }}
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    helm.sh/chart: {{ include "istari-platform.chart" . }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with dig "persistence" "annotations" dict $jaegerValues }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ dig "persistence" "size" "10Gi" $jaegerValues | quote }}
  {{- with dig "persistence" "storageClassName" "" $jaegerValues }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
