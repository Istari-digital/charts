{{- $serviceValues := .Values.identityService -}}
{{- $migrationResources := dig "migrations" "resources" dict $serviceValues -}}
{{- if $serviceValues.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "identity.fullname" . | quote }}
  labels:
    {{- include "identity.labels" . | nindent 4 }}
  {{- with $serviceValues.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not $serviceValues.autoscaling.enabled }}
  replicas: {{ $serviceValues.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "identity.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with $serviceValues.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "identity.labels" . | nindent 8 }}
        {{- with $serviceValues.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "identity.fullname" . | quote }}
      {{- with $serviceValues.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with default .Values.imagePullSecrets $serviceValues.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name | quote }}
        {{- with $serviceValues.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        image: {{ printf "%s/%s:%s" $serviceValues.registry $serviceValues.image $serviceValues.tag | quote }}
        imagePullPolicy: {{ $serviceValues.imagePullPolicy | quote }}
        ports:
        - containerPort: 8000
          name: "http"
          protocol: "TCP"
        livenessProbe:
          failureThreshold: 30
          httpGet:
            path: "/health/liveness"
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 8
          successThreshold: 1
          timeoutSeconds: 10
        readinessProbe:
          failureThreshold: 30
          httpGet:
            path: "/health/readiness"
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 8
          successThreshold: 1
          timeoutSeconds: 10
        {{- with $serviceValues.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        envFrom:
        {{- /*
        We put the generated default env vars in this config map so that user-defined values of
        'identityService.secretName', 'identityService.extraEnvSecrets', and 'identityService.env' will always override them.
        */}}
        - configMapRef:
            name: {{ include "identity.configmap.name" . | quote }}
        {{- if $serviceValues.secretName }}
        - secretRef:
            name: {{ $serviceValues.secretName | quote }}
        {{- end }}
        {{- with $serviceValues.extraEnvSecrets }}
        {{- range . }}
        - secretRef:
            name: {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- if or $serviceValues.env .Values.trustedCertBundle }}
        env:
        {{- with $serviceValues.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.trustedCertBundle }}
        - name: GRPC_DEFAULT_SSL_ROOTS_FILE_PATH
          value: /usr/lib/ssl/cert.pem
        - name: REQUESTS_CA_BUNDLE
          value: /usr/lib/ssl/cert.pem
        - name: SSL_CERT_DIR
          value: /usr/lib/ssl/certs
        - name: SSL_CERT_FILE
          value: /usr/lib/ssl/cert.pem
        {{- end }}
        {{- end }}
        {{- if or $serviceValues.volumeMounts .Values.trustedCertBundle }}
        volumeMounts:
        {{- with $serviceValues.volumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.trustedCertBundle }}
        - name: trusted-certs
          mountPath: /usr/lib/ssl/cert.pem
          subPath: bundle.crt
        {{- end }}
        {{- end }}
      {{- $runMigrationsInline := not (dig "migrations" "runAsJob" false $serviceValues) }}
      {{- $dgraphMigrateEnabled := dig "dgraphMigrations" "enabled" false $serviceValues }}
      {{- $dgraphMigrateResources := dig "dgraphMigrations" "resources" dict $serviceValues | default $migrationResources }}
      {{- if or $runMigrationsInline $dgraphMigrateEnabled }}
      initContainers:
      {{- if $runMigrationsInline }}
      - name: "init-db"
        {{- with $serviceValues.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        image: {{ printf "%s/%s:%s" $serviceValues.registry $serviceValues.image $serviceValues.tag | quote }}
        imagePullPolicy: {{ $serviceValues.imagePullPolicy | quote }}
        command:
        - "/migrate"
        {{- with $migrationResources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        envFrom:
        {{- /*
        We put the generated default env vars in this config map so that user-defined values of
        'identityService.secretName', 'identityService.extraEnvSecrets', and 'identityService.env' will always override them.
        */}}
        - configMapRef:
            name: {{ include "identity.configmap.name" . | quote }}
        {{- if $serviceValues.secretName }}
        - secretRef:
            name: {{ $serviceValues.secretName | quote }}
        {{- end }}
        {{- with $serviceValues.extraEnvSecrets }}
        {{- range . }}
        - secretRef:
            name: {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- $jaegerEnabled := dig "enabled" false (default dict .Values.jaeger) }}
        {{- if or $serviceValues.env .Values.trustedCertBundle $jaegerEnabled }}
        env:
        {{- /* Chart-injected OTEL identity FIRST so the user's env entries below override it */}}
        {{- if $jaegerEnabled }}
        {{- include "istari-platform.otelWorkloadEnv" (dict "service" "identity-service" "container" "init-db") | nindent 8 }}
        {{- end }}
        {{- with $serviceValues.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.trustedCertBundle }}
        - name: GRPC_DEFAULT_SSL_ROOTS_FILE_PATH
          value: /usr/lib/ssl/cert.pem
        - name: REQUESTS_CA_BUNDLE
          value: /usr/lib/ssl/cert.pem
        - name: SSL_CERT_DIR
          value: /usr/lib/ssl/certs
        - name: SSL_CERT_FILE
          value: /usr/lib/ssl/cert.pem
        {{- end }}
        {{- end }}
        {{- if or $serviceValues.volumeMounts .Values.trustedCertBundle }}
        volumeMounts:
        {{- with $serviceValues.volumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.trustedCertBundle }}
        - name: trusted-certs
          mountPath: /usr/lib/ssl/cert.pem
          subPath: bundle.crt
        {{- end }}
        {{- end }}
      {{- end }}
      {{- /*
      Dgraph schema migration (gated on identityService.dgraphMigrations.enabled):
      apply the Dgraph schema before the main container starts. The binary ships
      in the same image. Enable when identityService.databaseType=dgraph with the
      Dgraph URL (ISTARI_DIGITAL_IDENTITY_SERVICE_DGRAPH_URL) in scope. migrate-dgraph
      up is idempotent, so re-running on every pod start is safe. Ordered after
      init-db so both schema systems are current.
      */}}
      {{- if $dgraphMigrateEnabled }}
      - name: "init-dgraph"
        {{- with $serviceValues.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        image: {{ printf "%s/%s:%s" $serviceValues.registry $serviceValues.image $serviceValues.tag | quote }}
        imagePullPolicy: {{ $serviceValues.imagePullPolicy | quote }}
        command:
        - "/migrate-dgraph"
        - "up"
        {{- with $dgraphMigrateResources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "identity.configmap.name" . | quote }}
        {{- if $serviceValues.secretName }}
        - secretRef:
            name: {{ $serviceValues.secretName | quote }}
        {{- end }}
        {{- with $serviceValues.extraEnvSecrets }}
        {{- range . }}
        - secretRef:
            name: {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- if or $serviceValues.env .Values.trustedCertBundle }}
        env:
        {{- with $serviceValues.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.trustedCertBundle }}
        - name: GRPC_DEFAULT_SSL_ROOTS_FILE_PATH
          value: /usr/lib/ssl/cert.pem
        - name: REQUESTS_CA_BUNDLE
          value: /usr/lib/ssl/cert.pem
        - name: SSL_CERT_DIR
          value: /usr/lib/ssl/certs
        - name: SSL_CERT_FILE
          value: /usr/lib/ssl/cert.pem
        {{- end }}
        {{- end }}
        {{- if or $serviceValues.volumeMounts .Values.trustedCertBundle }}
        volumeMounts:
        {{- with $serviceValues.volumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.trustedCertBundle }}
        - name: trusted-certs
          mountPath: /usr/lib/ssl/cert.pem
          subPath: bundle.crt
        {{- end }}
        {{- end }}
      {{- end }}
      {{- end }}
      {{- if or $serviceValues.volumes .Values.trustedCertBundle }}
      volumes:
      {{- with $serviceValues.volumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.trustedCertBundle }}
      - name: trusted-certs
        configMap:
          name: {{ include "shared.trustedCerts.name" . | quote }}
      {{- end }}
      {{- end }}
      {{- with $serviceValues.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceValues.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceValues.tolerations }}
      tolerations:
      {{- toYaml . | nindent 6 }}
      {{- end }}
{{- end }}
