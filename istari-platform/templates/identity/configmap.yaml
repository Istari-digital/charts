{{- /*
We put the generated default env vars in this config map so that user-defined values of
'identityService.secretName', 'identityService.extraEnvSecrets', and 'identityService.env' will always override them.
*/}}
{{- $serviceValues := .Values.identityService -}}
{{- if $serviceValues.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "identity.configmap.name" . | quote }}
  labels:
    {{- include "identity.labels" . | nindent 4 }}
  {{- if dig "migrations" "runAsJob" false $serviceValues }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-15"
  {{- end }}
data:
  ISTARI_DIGITAL_REGISTRY_SERVICE_URL: {{ printf "http://%s" (include "fileservice.fullname" .) | quote }}
  {{- if dig "enabled" false (default dict .Values.jaeger) }}
  {{- /* identity-service uses the OTLP/HTTP exporter → target Jaeger's 4318, not the gRPC 4317
  fileservice uses. Web-container identity; init-db/db-migrate override via
  "istari-platform.otelWorkloadEnv". */}}
  ISTARI_DIGITAL_IDENTITY_SERVICE_OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "istari-platform.jaeger.otlpHttpUrl" . | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_SERVICE_NAME: "identity-service.web"
  OTEL_RESOURCE_ATTRIBUTES: "k8s.container.name=istari-platform"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_METRICS_EXPORTER: "none"
  {{- end }}
{{- end }}
