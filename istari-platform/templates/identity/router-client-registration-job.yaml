{{- $serviceValues := .Values.identityService -}}
{{- $registration := $serviceValues.identityRouterClientRegistration -}}
{{- $fileserviceValues := .Values.fileservice -}}
{{- $registrationPodAnnotations := dig "podAnnotations" dict $registration -}}
{{- $registrationPodLabels := dig "podLabels" dict $registration -}}
{{- $registrationResources := dig "resources" dict $registration -}}
{{- $autoCleanupSuccessfulJob := dig "autoCleanupSuccessfulJob" true $registration -}}
{{- if and $serviceValues.enabled $fileserviceValues.enabled $registration.enabled }}
{{- $_ := $fileserviceValues.secretName | required "fileservice.secretName is required when identityService.identityRouterClientRegistration.enabled is true" -}}
{{- $_ := $serviceValues.secretName | required "identityService.secretName is required when identityService.identityRouterClientRegistration.enabled is true" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "identity.routerClientRegistration.jobName" . | quote }}
  labels:
    {{- include "identity.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: {{ if $autoCleanupSuccessfulJob }}before-hook-creation,hook-succeeded{{ else }}before-hook-creation{{ end }}
spec:
  backoffLimit: {{ $registration.backoffLimit | int }}
  template:
    metadata:
      labels:
        {{- include "identity.labels" . | nindent 8 }}
        {{- with $registrationPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        sidecar.istio.io/inject: "false"
        {{- with $registrationPodAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: {{ $registration.restartPolicy | quote }}
      serviceAccountName: {{ include "identity.fullname" . | quote }}
      {{- with $serviceValues.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with default .Values.imagePullSecrets $serviceValues.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      containers:
      - name: register-client
        {{- with $serviceValues.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        image: {{ printf "%s/%s:%s" $serviceValues.registry $serviceValues.image $serviceValues.tag | quote }}
        imagePullPolicy: {{ $serviceValues.imagePullPolicy | quote }}
        command:
        - "/register-client"
        # $(VAR) is expanded by Kubernetes from the env vars below, so the secret
        # value and DB URL never appear in plaintext in the pod manifest.
        args:
        - "-secret"
        - "$(IDENTITY_ROUTER_SECRET)"
        - "-database-url"
        - "$(DATABASE_URL)"
        env:
        - name: IDENTITY_ROUTER_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $fileserviceValues.secretName | quote }}
              key: "FILE_SERVICE_IDENTITY_ROUTER_SECRET"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ $serviceValues.secretName | quote }}
              key: "ISTARI_DIGITAL_IDENTITY_SERVICE_DATABASE_URL"
        {{- with $registrationResources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with $serviceValues.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceValues.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceValues.tolerations }}
      tolerations:
      {{- toYaml . | nindent 6 }}
      {{- end }}
{{- end }}
