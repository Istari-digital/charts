{{- if .Values.validation.enabled }}
{{- /*
  Derive the validator's expected state from the chart's own values so it cannot
  drift from what was deployed. adminPasswordKey defaults to groot's key (the
  always-present superadmin); set validation.adminUser / adminPasswordSecretKey
  to validate as a different account. users carry their bootstrap passwordSecretKey.
*/ -}}
{{- $adminUser := .Values.validation.adminUser | default "groot" }}
{{- $adminKey := .Values.validation.adminPasswordSecretKey }}
{{- if not $adminKey }}
  {{- if eq $adminUser "groot" }}
    {{- $adminKey = .Values.alpha.acl.bootstrap.grootPasswordSecretKey }}
  {{- else }}
    {{- $adminKey = printf "%s_password" $adminUser }}
  {{- end }}
{{- end }}
{{- $users := list }}
{{- range .Values.alpha.acl.bootstrap.users }}
  {{- $users = append $users (dict "name" .name "passwordKey" .passwordSecretKey) }}
{{- end }}
{{- $groups := list }}
{{- range .Values.alpha.acl.bootstrap.groups }}
  {{- $groups = append $groups (dict "name" .name "rules" (.rules | default list)) }}
{{- end }}
{{- $cronjobs := list }}
{{- if .Values.validation.checkBackups }}
  {{- if .Values.backups.full.enabled }}
    {{- $cronjobs = append $cronjobs (dict "name" (printf "%s-full" (include "dgraph-sec.backups.fullname" .)) "schedule" .Values.backups.full.schedule) }}
  {{- end }}
  {{- if .Values.backups.incremental.enabled }}
    {{- $cronjobs = append $cronjobs (dict "name" (printf "%s-inc" (include "dgraph-sec.backups.fullname" .)) "schedule" .Values.backups.incremental.schedule) }}
  {{- end }}
{{- end }}
{{- $expected := dict
  "namespace" (include "dgraph-sec.namespace" .)
  "expectedAlphas" (.Values.alpha.replicaCount | int)
  "expectedZeros" (.Values.zero.replicaCount | int)
  "aclEnabled" .Values.alpha.acl.enabled
  "adminUser" $adminUser
  "adminPasswordKey" $adminKey
  "users" $users
  "groups" $groups
  "backups" (dict "check" .Values.validation.checkBackups "roundtrip" .Values.validation.backupRoundtrip "cronjobs" $cronjobs)
}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dgraph-sec.alpha.fullname" . }}-validate
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" "validate") | nindent 4 }}
data:
  validate.sh: |
{{ .Files.Get "files/validation/validate.sh" | indent 4 }}
  expected.json: |
    {{ $expected | toJson }}
{{- end }}
