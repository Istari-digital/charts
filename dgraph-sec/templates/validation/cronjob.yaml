{{- if and .Values.validation.enabled .Values.validation.cronjob.enabled }}
{{- /*
  Suspended manual-trigger template. It never fires on its own (suspended +
  a never-occurring schedule); an operator runs it on demand:
    kubectl create job --from=cronjob/{{ include "dgraph-sec.alpha.fullname" . }}-validate \
      -n {{ include "dgraph-sec.namespace" . }} {{ include "dgraph-sec.alpha.fullname" . }}-validate-manual
*/}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "dgraph-sec.alpha.fullname" . }}-validate
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" "validate") | nindent 4 }}
spec:
  schedule: "0 0 31 2 *" # 31 February: never fires.
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        {{- include "dgraph-sec.labels" (dict "ctx" . "component" "validate") | nindent 8 }}
    spec:
      backoffLimit: {{ .Values.validation.job.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "dgraph-sec.labels" (dict "ctx" . "component" "validate") | nindent 12 }}
            {{- with .Values.networkPolicy.clientPodLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.validation.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          {{- include "dgraph-sec.validation.podSpec" . | nindent 10 }}
{{- end }}
