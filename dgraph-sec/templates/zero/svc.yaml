apiVersion: v1
kind: Service
metadata:
  name: {{ template "dgraph-sec.zero.fullname" . }}
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- $extra := dict "monitor" .Values.zero.monitorLabel }}
    {{- with .Values.zero.service.labels }}{{ $extra = merge $extra . }}{{ end }}
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.zero.name "extra" $extra) | nindent 4 }}
  {{- with .Values.zero.service.annotations }}
  annotations:
    {{- toYaml . | trimSuffix "\n" | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.zero.service.type }}
  {{- if .Values.zero.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.zero.service.loadBalancerIP }}
  {{- end }}
  {{- if .Values.zero.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.zero.service.externalTrafficPolicy }}
  {{- end }}
  ports:
    - port: 5080
      targetPort: 5080
      name: grpc-zero
    - port: 6080
      targetPort: 6080
      name: http-zero
  {{- with .Values.zero.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    app: {{ template "dgraph-sec.name" . }}
    release: {{ .Release.Name }}
    component: {{ .Values.zero.name }}
