apiVersion: v1
kind: Service
metadata:
  name: {{ template "dgraph-sec.alpha.fullname" . }}-headless
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name "extra" .Values.alpha.serviceHeadless.labels) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: grpc-alpha-int
      port: 7080
      targetPort: 7080
    ## http-alpha (8080) and grpc-alpha (9080) must be declared here even though
    ## clients normally use the ClusterIP Service: the backup CronJobs address a
    ## single pinned pod (alpha-0) through this headless Service, and under a
    ## STRICT-mTLS Istio mesh the client sidecar only builds an mTLS route for
    ## ports the Service declares. Without 8080 here, backup /admin logins fall
    ## through to plaintext and Alpha's sidecar resets them.
    - name: http-alpha
      port: 8080
      targetPort: 8080
    - name: grpc-alpha
      port: 9080
      targetPort: 9080
  selector:
    app: {{ template "dgraph-sec.name" . }}
    component: {{ .Values.alpha.name }}
    release: {{ .Release.Name }}
  publishNotReadyAddresses: {{ .Values.alpha.service.publishNotReadyAddresses }}
