{{- $hasS3Keys := include "dgraph-sec.backups.keys.s3.enabled" . -}}
{{- $hasMinioKeys := include "dgraph-sec.backups.keys.minio.enabled" . -}}
{{- $backupsEnabled := or .Values.backups.full.enabled .Values.backups.incremental.enabled }}
{{- $initContainerEnabled := or .Values.alpha.initContainers.init.enabled .Values.alpha.extraInitContainers }}
{{- if and (eq (include "dgraph-sec.nativeTLS" (dict "ctx" . "tls" .Values.alpha.tls)) "true") (contains "--tls" (.Values.alpha.extraFlags | default "")) }}
{{- fail "alpha.extraFlags contains --tls, but the chart synthesizes it when serviceMesh.enabled=false and alpha.tls.enabled=true. Remove --tls from alpha.extraFlags and set alpha.tls.internalPort / clientName / clientAuthType instead." }}
{{- end }}
{{- if and (eq (include "dgraph-sec.nativeTLS" (dict "ctx" . "tls" .Values.alpha.tls)) "true") (eq .Values.alpha.tls.clientAuthType "REQUIREANDVERIFY") }}
{{- if not .Values.alpha.tls.clientName }}
{{- fail "alpha.tls.clientAuthType=REQUIREANDVERIFY requires alpha.tls.clientName so in-cluster callers (the ACL bootstrap Job and inter-node TLS) can present a client certificate." }}
{{- end }}
{{- if or (and .Values.alpha.startupProbe.enabled (not .Values.alpha.customStartupProbe)) (and .Values.alpha.livenessProbe.enabled (not .Values.alpha.customLivenessProbe)) (and .Values.alpha.readinessProbe.enabled (not .Values.alpha.customReadinessProbe)) }}
{{- fail "alpha.tls.clientAuthType=REQUIREANDVERIFY forces every client to present a certificate, which the built-in httpGet probes cannot do (the kubelet has no client cert). Relax alpha.tls.clientAuthType (e.g. VERIFYIFGIVEN) on the external ports, or supply alpha.customStartupProbe / customLivenessProbe / customReadinessProbe (exec probes that present the client cert)." }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ template "dgraph-sec.alpha.fullname" . }}
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name) | nindent 4 }}
spec:
  serviceName: {{ template "dgraph-sec.alpha.fullname" . }}-headless
  replicas: {{ .Values.alpha.replicaCount }}
  podManagementPolicy: {{ .Values.alpha.podManagementPolicy | quote }}
  updateStrategy:
    type: {{ .Values.alpha.updateStrategy | quote }}
    {{- if (eq "Recreate" .Values.alpha.updateStrategy) }}
    rollingUpdate: null
    {{- else if .Values.alpha.rollingUpdatePartition }}
    rollingUpdate:
      partition: {{ .Values.alpha.rollingUpdatePartition }}
    {{- end }}
  selector:
    matchLabels:
      app: {{ template "dgraph-sec.name" . }}
      release: {{ .Release.Name }}
      component: {{ .Values.alpha.name }}
  {{- if .Values.alpha.persistence.enabled }}
  {{- with .Values.alpha.persistence.persistentVolumeClaimRetentionPolicy }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: {{ .whenDeleted | default "Retain" }}
    whenScaled: {{ .whenScaled | default "Retain" }}
  {{- end }}
  {{- end }}
  template:
    metadata:
      name: {{ template "dgraph-sec.alpha.fullname" . }}
      {{- if or .Values.alpha.metrics.enabled .Values.alpha.extraAnnotations .Values.datadog.enabled }}
      annotations:
        {{- if .Values.alpha.metrics.enabled }}
        prometheus.io/path: /debug/prometheus_metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
        {{- end }}
        {{- if .Values.datadog.enabled }}
        {{- include "dgraph-sec.datadogAnnotations" (dict "ctx" . "component" "alpha") | nindent 8 }}
        {{- end }}
        {{- with .Values.alpha.extraAnnotations }}
{{- toYaml . | trimSuffix "\n" | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name "podLabels" .Values.alpha.podLabels) | nindent 8 }}
        {{- if .Values.datadog.enabled }}
        {{- include "dgraph-sec.datadogLabels" (dict "ctx" . "component" "alpha") | nindent 8 }}
        {{- end }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ include "dgraph-sec.serviceAccountName" . }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.alpha.automountServiceAccountToken }}
      {{- if .Values.alpha.schedulerName }}
      schedulerName: {{ .Values.alpha.schedulerName }}
      {{- end }}
      {{- if or (eq .Values.alpha.antiAffinity "hard") (eq .Values.alpha.antiAffinity "soft") .Values.alpha.nodeAffinity }}
      affinity:
      {{- end }}
      {{- if eq .Values.alpha.antiAffinity "hard" }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: component
                operator: In
                values:
                - {{ .Values.alpha.name }}
            topologyKey: {{ .Values.alpha.podAntiAffinitytopologyKey }}
      {{- else if eq .Values.alpha.antiAffinity "soft" }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - {{ .Values.alpha.name }}
              topologyKey: {{ .Values.alpha.podAntiAffinitytopologyKey }}
      {{- end }}
      {{- with .Values.alpha.nodeAffinity }}
        nodeAffinity:
{{ toYaml . | indent 10 }}
      {{- end }}
{{- include "dgraph-sec.imagePullSecrets" . | indent 6 }}
      {{- if .Values.alpha.securityContext.enabled }}
      securityContext:
        {{- omit .Values.alpha.securityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.alpha.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.alpha.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.alpha.tolerations }}
      tolerations:
{{ toYaml .Values.alpha.tolerations | indent 8 }}
      {{- end }}
      {{- if $initContainerEnabled }}
      initContainers:
      {{- with .Values.alpha.extraInitContainers }}
        {{- tpl (toYaml .) $ | nindent 6 }}
      {{- end }}
      {{- if .Values.alpha.initContainers.init.enabled }}
      - name: {{ template "dgraph-sec.alpha.fullname" . }}-init
        image: {{ template "dgraph-sec.initContainers.init.image" . }}
        imagePullPolicy: {{ .Values.alpha.initContainers.init.image.pullPolicy | quote }}
        {{- if .Values.alpha.containerSecurityContext.enabled }}
        securityContext:
          {{- omit .Values.alpha.containerSecurityContext "enabled" | toYaml | nindent 10 }}
        {{- end }}
        {{- with .Values.alpha.initContainers.init.env }}
        env:
          {{- tpl (toYaml .) $ | nindent 10 }}
        {{- end }}
        {{- with .Values.alpha.initContainers.init.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
        {{- range .Values.alpha.initContainers.init.command }}
          - {{ . | quote }}
        {{- end }}
        {{- with .Values.alpha.initContainers.init.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .Values.alpha.persistence.enabled }}
        volumeMounts:
        - name: datadir
          mountPath: /dgraph
        {{- end }}
      {{- end }}
      {{- end }}
      containers:
      - name: {{ template "dgraph-sec.alpha.fullname" . }}
        image: {{ template "dgraph-sec.image" . }}
        {{- if .Values.alpha.containerSecurityContext.enabled }}
        securityContext:
          {{- omit .Values.alpha.containerSecurityContext "enabled" | toYaml | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: 7080
          name: grpc-alpha-int
        - containerPort: 8080
          name: http-alpha
        - containerPort: 9080
          name: grpc-alpha
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          {{- if and $backupsEnabled $hasMinioKeys }}
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ template "dgraph-sec.backups.fullname" . }}-secret
                key: minio_access_key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ template "dgraph-sec.backups.fullname" . }}-secret
                key: minio_secret_key
          {{- end }}
          {{- if and $backupsEnabled $hasS3Keys }}
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: {{ template "dgraph-sec.backups.fullname" . }}-secret
                key: s3_access_key
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ template "dgraph-sec.backups.fullname" . }}-secret
                key: s3_secret_key
          {{- end }}
          {{- if .Values.alpha.configFile }}
          - name: DGRAPH_ALPHA_CONFIG
            value: /dgraph/config/{{ first (keys .Values.alpha.configFile | uniq | sortAlpha) }}
          {{- end }}
        {{- with .Values.alpha.extraEnvs }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.alpha.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
          - bash
          - "-c"
          ## NOTE: `awk gsub` trims a trailing dot from the FQDN. Some clusters
          ##       return `hostname -f` with a trailing "." (the DNS root label);
          ##       dgraph rejects an address with a trailing dot. Defensive — keep
          ##       it unless you have verified this fork's image never emits one.
          - |
            set -ex
            ## ACL and encryption-at-rest activate here, not merely by setting
            ## `alpha.acl.enabled`/`alpha.encryption.enabled`. Those keys provision the
            ## Secret and mount; the matching superflag below is what makes Dgraph use
            ## them. Keep the two in lockstep so "enabled" always means "active".
            exec dgraph-sec alpha --my=$(hostname -f | awk '{gsub(/\.$/,""); print $0}'):7080 --zero {{ template "dgraph-sec.multiZeros" . }} {{ template "dgraph-sec.logFlags" .Values.alpha }} {{ .Values.alpha.extraFlags }}{{- if eq (include "dgraph-sec.nativeTLS" (dict "ctx" . "tls" .Values.alpha.tls)) "true" }} {{ include "dgraph-sec.tlsFlag" (dict "tls" .Values.alpha.tls "path" "/dgraph/tls") }}{{- end }}{{- if .Values.alpha.acl.enabled }} --acl "secret-file=/dgraph/acl/{{ .Values.alpha.acl.secretFile }};"{{- end }}{{- if .Values.alpha.encryption.enabled }} --encryption "key-file=/dgraph/enc/{{ .Values.alpha.encryption.keyFile }};"{{- end }}{{- if .Values.tracing.enabled }} --trace "jaeger={{ .Values.tracing.endpoint }}; ratio={{ .Values.tracing.ratio }}; service={{ .Values.tracing.alpha.service }};"{{- end }}
        resources:
{{ toYaml .Values.alpha.resources | indent 10 }}
        {{- if .Values.alpha.startupProbe.enabled }}
        startupProbe:
          httpGet:
            port: {{ .Values.alpha.startupProbe.port }}
            path: {{ .Values.alpha.startupProbe.path }}
            {{- if eq (include "dgraph-sec.nativeTLS" (dict "ctx" . "tls" .Values.alpha.tls)) "true" }}
            scheme: HTTPS
            {{- end }}
          periodSeconds: {{ .Values.alpha.startupProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.alpha.startupProbe.timeoutSeconds }}
          successThreshold: {{ .Values.alpha.startupProbe.successThreshold }}
          failureThreshold: {{ .Values.alpha.startupProbe.failureThreshold }}
        {{- else if .Values.alpha.customStartupProbe }}
        startupProbe: {{- toYaml .Values.alpha.customStartupProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.alpha.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            port: {{ .Values.alpha.livenessProbe.port }}
            path: {{ .Values.alpha.livenessProbe.path }}
            {{- if eq (include "dgraph-sec.nativeTLS" (dict "ctx" . "tls" .Values.alpha.tls)) "true" }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: {{ .Values.alpha.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.alpha.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.alpha.livenessProbe.timeoutSeconds }}
          successThreshold: {{ .Values.alpha.livenessProbe.successThreshold }}
          failureThreshold: {{ .Values.alpha.livenessProbe.failureThreshold }}
        {{- else if .Values.alpha.customLivenessProbe }}
        livenessProbe: {{- toYaml .Values.alpha.customLivenessProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.alpha.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            port: {{ .Values.alpha.readinessProbe.port }}
            path: {{ .Values.alpha.readinessProbe.path }}
            {{- if eq (include "dgraph-sec.nativeTLS" (dict "ctx" . "tls" .Values.alpha.tls)) "true" }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: {{ .Values.alpha.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.alpha.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.alpha.readinessProbe.timeoutSeconds }}
          successThreshold: {{ .Values.alpha.readinessProbe.successThreshold }}
          failureThreshold: {{ .Values.alpha.readinessProbe.failureThreshold }}
        {{- else if .Values.alpha.customReadinessProbe }}
        readinessProbe: {{- toYaml .Values.alpha.customReadinessProbe | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: datadir
          mountPath: /dgraph
        {{- if .Values.alpha.configFile }}
        - name: config-volume
          mountPath: /dgraph/config
        {{- end }}
        {{- if .Values.alpha.tls.enabled }}
        - name: tls-volume
          mountPath: /dgraph/tls
        {{- end }}
        {{- if .Values.alpha.encryption.enabled }}
        - name: enc-volume
          mountPath: /dgraph/enc
        {{- end }}
        {{- if .Values.alpha.acl.enabled }}
        - name: acl-volume
          mountPath: /dgraph/acl
        {{- end }}
        {{- if and $backupsEnabled .Values.backups.nfs.enabled }}
        - name: backups-nfs-volume
          mountPath: {{ .Values.backups.nfs.mountPath }}
        {{- end }}
        {{- if and $backupsEnabled .Values.backups.volume.enabled }}
        - name: backups-vol-volume
          mountPath: {{ .Values.backups.volume.mountPath }}
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.alpha.terminationGracePeriodSeconds }}
      volumes:
      {{- if not .Values.alpha.persistence.enabled }}
      # When persistence is enabled the volumeClaimTemplates entry below supplies
      # the "datadir" volume — the StatefulSet controller injects a per-pod PVC
      # (datadir-<sts>-<ordinal>). Only declare an emptyDir fallback when
      # persistence is disabled.
      - name: datadir
        emptyDir: {}
      {{- end }}
      {{- if and $backupsEnabled .Values.backups.nfs.enabled }}
      - name: backups-nfs-volume
        persistentVolumeClaim:
          claimName: {{ template "dgraph-sec.backups.fullname" . }}-claim
      {{- end }}
      {{- if and $backupsEnabled .Values.backups.volume.enabled }}
      - name: backups-vol-volume
        persistentVolumeClaim:
          claimName: {{ .Values.backups.volume.claim }}
      {{- end }}
      {{- if .Values.alpha.configFile }}
      - name: config-volume
        configMap:
          name: {{ template "dgraph-sec.alpha.fullname" . }}-config
      {{- end }}
      {{- if .Values.alpha.tls.enabled }}
      - name: tls-volume
        secret:
          secretName: {{ template "dgraph-sec.alpha.fullname" . }}-tls-secret
      {{- end }}
      {{- if .Values.alpha.encryption.enabled }}
      - name: enc-volume
        secret:
          secretName: {{ .Values.alpha.encryption.existingSecret | default (printf "%s-encryption-secret" (include "dgraph-sec.alpha.fullname" .)) }}
      {{- end }}
      {{- if .Values.alpha.acl.enabled }}
      - name: acl-volume
        secret:
          # existingSecret lets a pre-created Secret (e.g. a Terraform-managed one)
          # supply the HMAC key, so it never has to be rendered through Helm values.
          secretName: {{ .Values.alpha.acl.existingSecret | default (printf "%s-acl-secret" (include "dgraph-sec.alpha.fullname" .)) }}
      {{- end }}

{{- if .Values.alpha.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: datadir
        {{- with .Values.alpha.persistence.annotations }}
        annotations:
          {{- range $key, $value := . }}
          {{ $key }}: {{ $value | quote }}
          {{- end }}
        {{- end }}
      spec:
        accessModes:
        {{- range .Values.alpha.persistence.accessModes }}
          - {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.alpha.persistence.size | quote }}
      {{- if .Values.alpha.persistence.storageClass }}
      {{- if (eq "-" .Values.alpha.persistence.storageClass) }}
        storageClassName: ""
      {{- else }}
        storageClassName: {{ .Values.alpha.persistence.storageClass | quote }}
      {{- end -}}
      {{- end -}}
{{- end }}
