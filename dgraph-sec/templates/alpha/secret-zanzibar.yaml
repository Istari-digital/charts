{{ if and .Values.alpha.zanzibar.enabled (not .Values.alpha.zanzibar.existingSecret) .Values.alpha.zanzibar.file }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "dgraph-sec.alpha.fullname" . }}-zanzibar-secret
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name) | nindent 4 }}
type: Opaque
data:
  {{- with .Values.alpha.zanzibar.file }}
    {{- toYaml . | trimSuffix "\n" | nindent 2 }}
  {{- end }}
{{ end }}
