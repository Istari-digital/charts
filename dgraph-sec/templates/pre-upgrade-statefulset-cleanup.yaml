{{/*
Pre-upgrade hook: delete StatefulSets with --cascade=orphan so that Helm can
recreate them with updated immutable fields (e.g. selector.matchLabels) while
keeping existing pods running. The pods are adopted by the new StatefulSets
once the upgrade completes.

Gated by preUpgradeHook.enabled. This only matters for clusters migrating from
the v24-era selector labels; once a cluster has upgraded past that point the
hook is pure per-upgrade overhead (a Job + transient SA/RBAC on every
`helm upgrade`) and can be turned off.
*/}}
{{- if .Values.preUpgradeHook.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" .) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" .) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" .) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
subjects:
  - kind: ServiceAccount
    name: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
    namespace: {{ include "dgraph-sec.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" .) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      name: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
      labels:
        {{- include "dgraph-sec.labels" (dict "ctx" . "podLabels" .Values.preUpgradeHook.podLabels) | nindent 8 }}
      {{- with .Values.preUpgradeHook.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ template "dgraph-sec.fullname" . }}-pre-upgrade
      restartPolicy: Never
      {{- with .Values.alpha.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pre-upgrade
          image: {{ .Values.preUpgradeHook.image.registry }}/{{ .Values.preUpgradeHook.image.repository }}:{{ .Values.preUpgradeHook.image.tag }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ include "dgraph-sec.namespace" . }}"

              # StatefulSets (Alpha and Zero)
              for STS in {{ template "dgraph-sec.alpha.fullname" . }} {{ template "dgraph-sec.zero.fullname" . }}; do
                SELECTOR=$(kubectl get statefulset "$STS" -n "$NS" --ignore-not-found -o jsonpath='{.spec.selector.matchLabels.chart}')
                if [ -n "$SELECTOR" ]; then
                  echo "StatefulSet $STS has stale 'chart' selector label ($SELECTOR), deleting with --cascade=orphan..."
                  kubectl delete statefulset "$STS" --cascade=orphan -n "$NS"
                else
                  echo "StatefulSet $STS does not have 'chart' selector label (or does not exist), skipping."
                fi
              done

              # Deployments (Ratel)
              for DEPLOY in {{ template "dgraph-sec.ratel.fullname" . }}; do
                SELECTOR=$(kubectl get deployment "$DEPLOY" -n "$NS" --ignore-not-found -o jsonpath='{.spec.selector.matchLabels.chart}')
                if [ -n "$SELECTOR" ]; then
                  echo "Deployment $DEPLOY has stale 'chart' selector label ($SELECTOR), deleting with --cascade=orphan..."
                  kubectl delete deployment "$DEPLOY" --cascade=orphan -n "$NS"
                else
                  echo "Deployment $DEPLOY does not have 'chart' selector label (or does not exist), skipping."
                fi
              done
{{- end }}
