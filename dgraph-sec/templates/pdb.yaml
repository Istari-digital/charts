{{- /*
PodDisruptionBudgets for the alpha and zero Raft groups. Both default to
minAvailable: 2 so a voluntary disruption (node drain, cluster-autoscaler
scale-down) can never take more than one member at a time and drop quorum.
Set maxUnavailable instead of minAvailable to express the budget the other way.
*/ -}}
{{- if .Values.zero.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ template "dgraph-sec.zero.fullname" . }}
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.zero.name) | nindent 4 }}
spec:
  {{- if .Values.zero.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.zero.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.zero.pdb.minAvailable }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ template "dgraph-sec.name" . }}
      release: {{ .Release.Name }}
      component: {{ .Values.zero.name }}
{{- end }}
{{- if .Values.alpha.pdb.enabled }}
{{- if .Values.zero.pdb.enabled }}
---
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ template "dgraph-sec.alpha.fullname" . }}
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.alpha.name) | nindent 4 }}
spec:
  {{- if .Values.alpha.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.alpha.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.alpha.pdb.minAvailable }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ template "dgraph-sec.name" . }}
      release: {{ .Release.Name }}
      component: {{ .Values.alpha.name }}
{{- end }}
