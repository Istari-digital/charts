{{- if .Values.backups.full.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ template "dgraph-sec.backups.fullname" . }}-full
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.backups.name) | nindent 4 }}
spec:
  schedule: "{{ .Values.backups.full.schedule }}"
  jobTemplate:
    metadata:
      labels:
        {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.backups.name "extra" (dict "cronjob" (printf "%s-full" (include "dgraph-sec.backups.fullname" .)))) | nindent 8 }}
    spec:
      template:
        metadata:
          labels:
            {{- $extra := dict "cronjob" (printf "%s-full" (include "dgraph-sec.backups.fullname" .)) }}
            {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.backups.name "extra" $extra "podLabels" .Values.backups.podLabels) | nindent 12 }}
          {{- with .Values.backups.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
          serviceAccountName: {{ include "dgraph-sec.serviceAccountName" . }}
          {{- end }}
          automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- include "dgraph-sec.imagePullSecrets" . | indent 10 }}
          {{- if .Values.backups.schedulerName }}
          schedulerName: {{ .Values.backups.schedulerName }}
          {{- end }}
          ## Pin the backup pod to the same node group as the Alpha cluster it
          ## backs up. Reuse alpha.nodeSelector/alpha.tolerations (as the ACL
          ## bootstrap Job does) so a dedicated, tainted dgraph node group admits
          ## the CronJob pod instead of leaving it Pending or off the data tier.
          {{- if .Values.alpha.nodeSelector }}
          nodeSelector:
{{ toYaml .Values.alpha.nodeSelector | indent 12 }}
          {{- end }}
          {{- if .Values.alpha.tolerations }}
          tolerations:
{{ toYaml .Values.alpha.tolerations | indent 12 }}
          {{- end }}
          containers:
          - name: {{ template "dgraph-sec.backups.fullname" . }}-full
            image: {{ template "dgraph-sec.backups.image" . }}
            imagePullPolicy: {{ .Values.backups.image.pullPolicy | quote }}
            command:
             - /usr/bin/bash
             - "-c"
             - |
                {{- if .Values.backups.full.debug }}
                set -ex
                {{- else }}
                set -e
                {{- end }}

                source /scripts/backup.sh

                ## Use Single Alpha in Cluster to avoid potential issues with concurrent backups
                ## ref. https://discuss.dgraph.io/t/concurrent-backups-can-lead-to-issues/9934/2
                ALPHA_HOST="{{ template "dgraph-sec.alpha.fullname" . }}-0.{{ template "dgraph-sec.alpha.fullname" . }}-headless.${POD_NAMESPACE}.svc"

                BACKUP_DESTINATION={{ .Values.backups.destination }}
                SUBPATH={{ .Values.backups.subpath }}
                API_TYPE={{ template "dgraph-sec.backupsApiType" . }}
                MINIO_SECURE={{ .Values.backups.minioSecure }}

                ## Get Tokens
                {{- if .Values.backups.admin.auth_token }}
                AUTH_TOKEN=$(cat /backup_secrets/backup_auth_token)
                {{- end }}

                {{- if .Values.alpha.acl.enabled }}
                ## Quote every argument so a password containing spaces or shell
                ## metacharacters is passed to get_token as a single exact token
                ## rather than being word-split or glob-expanded.
                ACCESS_TOKEN=$(get_token "{{ required "backups.admin.user must be set when alpha.acl.enabled is true (do not rely on the well-known 'groot' superadmin)" .Values.backups.admin.user }}" "$(cat /backup_secrets/backup_admin_password)" "${AUTH_TOKEN:-}")
                {{- end }}

                ## Full Backup with optional access and auth tokens
                FORCE_FULL=true backup "$ACCESS_TOKEN" "$AUTH_TOKEN"
            volumeMounts:
            - name: backup-config-volume
              mountPath: /scripts
            {{- if .Values.alpha.tls.enabled }}
            - name: tls-volume
              mountPath: /dgraph/tls
            {{- end }}
            {{- if or .Values.alpha.acl.enabled .Values.backups.admin.auth_token }}
            - name: backup-secret-volume
              mountPath: /backup_secrets
            {{- end }}
            ## Mount NFS Backup volume so that datestamp directories can be created
            {{- if .Values.backups.nfs.enabled }}
            - name: backups-nfs-volume
              mountPath: {{ .Values.backups.nfs.mountPath }}
            {{- end }}
            ## Mount Backup volume so that datestamp directories can be created
            {{- if .Values.backups.volume.enabled }}
            - name: backups-vol-volume
              mountPath: {{ .Values.backups.volume.mountPath }}
            {{- end }}
            env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.alpha.tls.enabled }}
            - name: CACERT_PATH
              value: /dgraph/tls/ca.crt
            {{- if .Values.backups.admin.tls_client }}
            - name: CLIENT_CERT_PATH
              value: /dgraph/tls/client.{{ .Values.backups.admin.tls_client }}.crt
            - name: CLIENT_KEY_PATH
              value: /dgraph/tls/client.{{ .Values.backups.admin.tls_client }}.key
            {{- end }}
            {{- end }}
          restartPolicy: {{ .Values.backups.full.restartPolicy }}
          volumes:
          - name: backup-config-volume
            configMap:
              name: {{ template "dgraph-sec.backups.fullname" . }}-config
          {{- if .Values.alpha.tls.enabled }}
          - name: tls-volume
            secret:
              secretName: {{ template "dgraph-sec.alpha.fullname" . }}-tls-secret
          {{- end }}
          {{- if or .Values.alpha.acl.enabled .Values.backups.admin.auth_token }}
          - name: backup-secret-volume
          {{- if and .Values.alpha.acl.enabled .Values.backups.admin.existingSecret }}
            ## Admin password comes from a pre-created Secret
            ## (backups.admin.existingSecret); project just that one key to
            ## /backup_secrets/backup_admin_password (the path the script reads).
            ## Any auth_token still comes from the chart-managed Secret.
            projected:
              sources:
              - secret:
                  name: {{ .Values.backups.admin.existingSecret }}
                  items:
                  - key: {{ .Values.backups.admin.passwordSecretKey }}
                    path: backup_admin_password
              {{- if .Values.backups.admin.auth_token }}
              - secret:
                  name: {{ template "dgraph-sec.backups.fullname" . }}-secret
                  items:
                  - key: backup_auth_token
                    path: backup_auth_token
              {{- end }}
          {{- else }}
            secret:
              secretName: {{ template "dgraph-sec.backups.fullname" . }}-secret
          {{- end }}
          {{- end }}
          {{- if .Values.backups.nfs.enabled }}
          - name: backups-nfs-volume
            persistentVolumeClaim:
              claimName: {{ template "dgraph-sec.backups.fullname" . }}-claim
          {{- end }}
          {{- if .Values.backups.volume.enabled }}
          - name: backups-vol-volume
            persistentVolumeClaim:
              claimName: {{ .Values.backups.volume.claim }}
          {{- end }}
{{- end }}
