{{- if or .Values.backups.full.enabled .Values.backups.incremental.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "dgraph-sec.backups.fullname" . }}-config
  namespace: {{ include "dgraph-sec.namespace" . }}
  labels:
    {{- include "dgraph-sec.labels" (dict "ctx" . "component" .Values.backups.name) | nindent 4 }}
data:
  backup.sh: |
    ## NOTE: JSON responses are parsed with `jq`. The dgraph-sec image is a
    ## Chainguard (Wolfi) image whose `grep` is BusyBox — it has no PCRE (`-P`)
    ## support, so the old `grep -oP` extraction would fail outright. `jq` ships
    ## in the image and parses the responses correctly. Each extraction guards
    ## against an empty result so a parse failure is a loud, non-zero exit rather
    ## than a backup POSTed with no auth header.
    ######
    # require_json - guard a curl response before jq field extraction
    #  params:
    #    1: body - response body to validate
    #    2: curl_status - exit status of the curl that produced the body
    #    3: url - request URL, for the error message
    #  A mesh or network failure returns a plaintext body (e.g. Envoy's
    #  "upstream connect error...") that jq cannot parse; surface the curl
    #  status, the URL, and the raw body instead of a cryptic jq parse error.
    #  Only bodies that fail JSON validation are echoed, so a successful
    #  login response (which carries an accessJWT) is never printed.
    ##########################
    require_json() {
      BODY=${1}
      CURL_STATUS=${2}
      URL=${3}
      if [[ "$CURL_STATUS" -ne 0 ]]; then
        echo "ERROR: curl to ${URL} failed with exit ${CURL_STATUS}: ${BODY}" >&2
        return 1
      fi
      if [[ -z "$BODY" ]]; then
        echo "ERROR: empty response from ${URL}" >&2
        return 1
      fi
      if ! jq -e . >/dev/null 2>&1 <<< "$BODY"; then
        echo "ERROR: non-JSON response from ${URL}: ${BODY}" >&2
        return 1
      fi
    }

    ######
    # get_token_rest - get accessJWT token with REST command for Dgraph 1.x
    ##########################
    get_token_rest() {
      ## Build the JSON body with `jq -n` so credentials containing quotes,
      ## backslashes, or newlines are escaped correctly instead of breaking the
      ## payload (string interpolation would corrupt the request).
      JSON=$(jq -n --arg userid "$USER" --arg password "$PASSWORD" '{userid: $userid, password: $password}')
      CURL_STATUS=0
      RESULT=$(
        /usr/bin/curl --silent \
          "${HEADERS[@]}" \
          "${CERTOPTS[@]}" \
          --request POST \
          ${ALPHA_HOST}:8080/login \
          --data "${JSON}"
      ) || CURL_STATUS=$?
      require_json "$RESULT" "$CURL_STATUS" "${ALPHA_HOST}:8080/login" || return 1

      ERROR=$(jq -r '.errors[0].message // empty' <<< "$RESULT")
      if [[ -n "$ERROR" ]]; then
        echo "ERROR: $ERROR"
        return 1
      fi

      TOKEN=$(jq -r '.data.accessJWT // empty' <<< "$RESULT")
      [[ -n "$TOKEN" ]] || { echo "ERROR: could not parse accessJWT from /login response" >&2; return 1; }
      echo "$TOKEN"

    }

    ######
    # get_token_graphql - get accessJWT token using GraphQL for Dgraph 20.03.1+
    ##########################
    get_token_graphql() {
      ## Build the request with `jq -n` and pass credentials as GraphQL variables
      ## (not inlined into the query string). This escapes quotes/backslashes/
      ## newlines correctly and removes any chance of query injection via the
      ## userid or password.
      GQL=$(jq -n --arg userId "$USER" --arg password "$PASSWORD" '{query: "mutation ($userId: String, $password: String) { login(userId: $userId, password: $password) { response { accessJWT } } }", variables: {userId: $userId, password: $password}}')
      CURL_STATUS=0
      RESULT=$(
        /usr/bin/curl --silent \
          "${HEADERS[@]}" \
          "${CERTOPTS[@]}" \
          --request POST \
          ${ALPHA_HOST}:8080/admin \
          --data "${GQL}"
      ) || CURL_STATUS=$?
      require_json "$RESULT" "$CURL_STATUS" "${ALPHA_HOST}:8080/admin" || return 1

      ERROR=$(jq -r '.errors[0].message // empty' <<< "$RESULT")
      if [[ -n "$ERROR" ]]; then
        echo "ERROR: $ERROR"
        return 1
      fi

      TOKEN=$(jq -r '.data.login.response.accessJWT // empty' <<< "$RESULT")
      [[ -n "$TOKEN" ]] || { echo "ERROR: could not parse accessJWT from /admin login response" >&2; return 1; }
      echo "$TOKEN"

    }

    ######
    # get_token - get accessJWT using GraphQL /admin or REST /login
    #  params:
    #    1: user (required)
    #    2: password (required)
    #  envvars:
    #    ALPHA_HOST (default: localhost) - dns name of dgraph alpha node
    #    CACERT_PATH - path to dgraph root ca (e.g. ca.crt) if TLS is enabled
    #    CLIENT_CERT_PATH - path to client cert (e.g. client.dgraphuser.crt) for client TLS
    #    CLIENT_KEY_PATH - path to client cert (e.g. client.dgraphuser.key) for client TLS
    ##########################
    get_token() {
      USER=${1}
      PASSWORD=${2}
      AUTH_TOKEN=${3:-""}
      CACERT_PATH=${CACERT_PATH:-""}
      CLIENT_CERT_PATH=${CLIENT_CERT_PATH:-""}
      CLIENT_KEY_PATH=${CLIENT_KEY_PATH:-""}

      ## Reset these arrays so repeated calls in the same shell (the CronJob runs
      ## get_token then backup) don't accumulate duplicate headers / cert options.
      HEADERS=()
      CERTOPTS=()

      ## user/password required for login
      if [[ -z "$USER" || -z "$PASSWORD" ]]; then
        return 1
      fi

      if [[ ! -z "$AUTH_TOKEN" ]]; then
        HEADERS+=('--header' "X-Dgraph-AuthToken: $AUTH_TOKEN")
      fi

      if [[ ! -z "$CACERT_PATH" ]]; then
        CERTOPTS+=('--cacert' "$CACERT_PATH")
        if [[ ! -z "$CLIENT_CERT_PATH" || ! -z "$CLIENT_KEY_PATH" ]]; then
          CERTOPTS+=(
            '--cert' "$CLIENT_CERT_PATH"
            '--key' "$CLIENT_KEY_PATH"
          )
        fi
        ALPHA_HOST=https://${ALPHA_HOST:-"localhost"}
      else
        ALPHA_HOST=${ALPHA_HOST:-"localhost"}
      fi

      API_TYPE=${API_TYPE:-"graphql"}
      if [[ "$API_TYPE" == "graphql" ]]; then
        HEADERS+=('--header' "Content-Type: application/json")
        get_token_graphql
      else
        get_token_rest
      fi
    }

    ######
    # backup - trigger binary backup GraphQL /admin or REST /login
    #  params:
    #    1: token (optional) - if ACL enabled pass token from get_token()
    #  envvars:
    #    BACKUP_DESTINATION (required) - filepath ("/path/to/backup"), s3://, or minio://
    #    ALPHA_HOST (default: localhost) - dns name of dgraph alpha node
    #    MINIO_SECURE (default: false) - set to true if minio service supports https
    #    FORCE_FULL (default: false) - set to true if forcing a full backup
    #    CACERT_PATH - path to dgraph root ca (e.g. ca.crt) if TLS is enabled
    #    CLIENT_CERT_PATH - path to client cert (e.g. client.dgraphuser.crt) for client TLS
    #    CLIENT_KEY_PATH - path to client cert (e.g. client.dgraphuser.key) for client TLS
    ##########################
    backup() {
      ACCESS_TOKEN=${1:-""}
      AUTH_TOKEN=${2:-""}
      CACERT_PATH=${CACERT_PATH:-""}
      CLIENT_CERT_PATH=${CLIENT_CERT_PATH:-""}
      CLIENT_KEY_PATH=${CLIENT_KEY_PATH:-""}

      ## Reset these arrays so headers / cert options from an earlier get_token
      ## call in the same shell aren't inherited and duplicated here.
      HEADERS=()
      CERTOPTS=()

      API_TYPE=${API_TYPE:-"graphql"}

      MINIO_SECURE=${MINIO_SECURE:-"false"}
      FORCE_FULL=${FORCE_FULL:-"false"}

      [[ -z "$BACKUP_DESTINATION" ]] && \
        { echo "'BACKUP_DESTINATION' is not set. Exiting" >&2; return 1; }

      if [[ ! -z "$ACCESS_TOKEN" ]]; then
        HEADERS+=('--header' "X-Dgraph-AccessToken: $ACCESS_TOKEN")
      fi

      if [[ ! -z "$AUTH_TOKEN" ]]; then
        HEADERS+=('--header' "X-Dgraph-AuthToken: $AUTH_TOKEN")
      fi

      if [[ ! -z "$CACERT_PATH" ]]; then
        CERTOPTS+=('--cacert' "$CACERT_PATH")
        if [[ ! -z "$CLIENT_CERT_PATH" || ! -z "$CLIENT_KEY_PATH" ]]; then
          CERTOPTS+=(
            '--cert' "$CLIENT_CERT_PATH"
            '--key' "$CLIENT_KEY_PATH"
          )
        fi
        ALPHA_HOST=https://${ALPHA_HOST:-"localhost"}
      else
        ALPHA_HOST=${ALPHA_HOST:-"localhost"}
      fi

      ## Configure destination with date stamp folder
      BACKUP_DESTINATION="${BACKUP_DESTINATION}/${SUBPATH}"
      ## Configure Minio Configuration
      if [[ "$MINIO_SECURE" == "false" && "$BACKUP_DESTINATION" =~ ^minio ]]; then
          BACKUP_DESTINATION="${BACKUP_DESTINATION}?secure=false"
      fi

      ## Create date-stamped directory for file system
      if [[ ! "$BACKUP_DESTINATION" =~ ^minio|^s3 ]]; then
        ## Check destination directory exist
        if [[ -d ${BACKUP_DESTINATION%/*} ]]; then
          mkdir -p $BACKUP_DESTINATION
        else
          echo "Designated Backup Destination '${BACKUP_DESTINATION%/*}' does not exist. Aborting."
          return 1
        fi
      fi

      if [[ "$API_TYPE" == "graphql" ]]; then
        HEADERS+=('--header' "Content-Type: application/json")
        backup_graphql
      else
        backup_rest
      fi

    }

    ######
    # backup_rest - trigger backup using REST command for Dgraph 1.x
    ##########################
    backup_rest() {
      URL_PATH="admin/backup?force_full=$FORCE_FULL"

      CURL_STATUS=0
      RESULT=$(/usr/bin/curl --silent \
        "${HEADERS[@]}" \
        "${CERTOPTS[@]}" \
        --request POST \
        ${ALPHA_HOST}:8080/$URL_PATH \
        --data "destination=$BACKUP_DESTINATION"
      ) || CURL_STATUS=$?
      require_json "$RESULT" "$CURL_STATUS" "${ALPHA_HOST}:8080/${URL_PATH}" || return 1

      ERROR=$(jq -r '.errors[0].message // empty' <<< "$RESULT")
      if [[ -n "$ERROR" ]]; then
        CODE=$(jq -r '.errors[0].code // empty' <<< "$RESULT")
        if [[ -n "$CODE" ]]; then
          echo "ERROR: $ERROR REASON='$CODE'"
        else
          echo "ERROR: $ERROR"
        fi
        return 1
      fi

      echo $RESULT

    }

    ######
    # backup_graphql - trigger backup using GraphQL for Dgraph 20.03.1+
    ##########################
    backup_graphql() {
      GQL="{\"query\": \"mutation { backup(input: {destination: \\\"${BACKUP_DESTINATION}\\\" forceFull: $FORCE_FULL }) { response { message code } } }\"}"

      CURL_STATUS=0
      RESULT=$(/usr/bin/curl --silent \
        "${HEADERS[@]}" \
        "${CERTOPTS[@]}" \
        --request POST \
        $ALPHA_HOST:8080/admin \
        --data "$GQL"
      ) || CURL_STATUS=$?
      require_json "$RESULT" "$CURL_STATUS" "${ALPHA_HOST}:8080/admin" || return 1

      ERROR=$(jq -r '.errors[0].message // empty' <<< "$RESULT")
      if [[ -n "$ERROR" ]]; then
        echo "ERROR: $ERROR"
        return 1
      fi

      echo $RESULT
    }
{{- end }}
